setw -g mode-keys vi

set -sg escape-time 0

# Enable extended keys (CSI u protocol) for modified key combos (Ctrl+Enter, etc.)
set -g extended-keys on
set -g extended-keys-format csi-u

# Use zsh as default shell, as a non-login interactive shell. Skipping login
# mode means tmux doesn't fire .zprofile, .zlogin, /etc/zprofile, or /etc/zlogin
# — saves ~1s per new pane on macOS (path_helper is slow under load). Any
# env that used to live in .zprofile/.zlogin should be in .zshenv instead.
set -g default-shell {{ brew_prefix }}/bin/zsh
set -g default-command "exec {{ brew_prefix }}/bin/zsh -i"

# Capture PATH from attaching shell and run restore maintenance
set-hook -g client-attached 'run-shell -b "$HOME/.local/bin/tmux-client-attached \"$PATH\""'

# Keep remote-title and window labels in sync without renaming sessions.
set-hook -g pane-focus-in 'run-shell -b "$HOME/.local/bin/tmux-remote-title publish"; run-shell -b "$HOME/.local/bin/tmux-window-label #{pane_id}"'
set-hook -g client-session-changed 'run-shell -b "$HOME/.local/bin/tmux-remote-title publish"; run-shell -b "$HOME/.local/bin/tmux-window-label #{pane_id}"'
set-hook -g pane-title-changed 'run-shell -b "$HOME/.local/bin/tmux-sync-remote-title #{pane_id}"'

{% raw %}bind -n M-\\ split-window -h -c '#{pane_current_path}'
{% endraw %}bind -n M-- split-window -v -c '#{pane_current_path}'
bind -n M-= select-layout even-horizontal
bind -n M-+ select-layout even-vertical
bind -n M-t new-window -c '#{pane_current_path}'
bind -n M-n next-window
bind -n M-p previous-window
bind -n M-, swap-window -d -t -1
bind -n M-. swap-window -d -t +1

bind-key -nr    M-Up resize-pane -U
bind-key -nr  M-Down resize-pane -D
bind-key -nr  M-Left resize-pane -L
bind-key -nr M-Right resize-pane -R

# Format-based (zero-fork) ssh detection, same pattern as is_vim below. The
# previous `ps -o args= -t | grep` took ~1-2s per keystroke on macOS, which
# showed up as a visible delay before M-y opened copy-mode. gh/devpod ssh
# wrappers exec ssh as a subprocess, so pane_current_command is `ssh` once
# the remote session is live.
is_ssh='#{m:ssh,#{pane_current_command}}'

bind-key -n M-PPage copy-mode -u

bind-key -n M-y if-shell -F "$is_ssh" 'send-keys M-y' 'copy-mode'
bind-key -n M-d if-shell -F "$is_ssh" 'send-keys M-d' 'run-shell -b "TMUX_PANE=#{pane_id} ~/.local/bin/review-diff"'
bind-key -n M-f if-shell -F "$is_ssh" 'send-keys M-f' 'run-shell -b "TMUX_PANE=#{pane_id} ~/.local/bin/tmux-review-open prompt-file"'
bind-key -n M-r if-shell -F "$is_ssh" 'send-keys M-r' 'run-shell -b "TMUX_PANE=#{pane_id} ~/.local/bin/tmux-review-toggle"'

# Smart upload: reads clipboard path, uploads if SSH'd, pastes result
bind-key -n M-u run-shell -b 'PATH="$HOME/.local/share/mise/shims:{{ brew_prefix }}/bin:/usr/local/bin:$PATH" && \
  tmux set-buffer "$(pbpaste)" && \
  result=$($HOME/.local/bin/smart-upload "$(tmux show-buffer)" "#{pane_tty}") && \
  tmux send-keys "$result"'

bind-key -n M-w display-popup -E -w 95% -h 90% tmux-switch-window
bind-key -n M-8 display-popup -E -w 60% -h 60% tmux-switch-session
bind-key -n M-9 switch-client -p
bind-key -n M-0 switch-client -n

set-option -g history-limit 100000


# Global status bar: on at the top. It carries a thin current-session window
# list while each pane keeps its own branch/path/host detail on the bottom
# border.
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-style 'bg=black,fg=colour252'
set -g status-left ''
set -g status-right ''
set -g status-left-length 0
set -g status-right-length 0
set -g window-status-separator ' || '
set -g pane-border-status bottom

# Border line colors: dark grey for inactive, bright cyan for active.
# Both use black bg so the pane-border-format content sits on a consistent
# dark bar, matching the old status-bar's status-bg/status-fg.
set -g pane-border-style 'bg=black,fg=colour240'
set -g pane-active-border-style 'bg=black,fg=colour51'

set -g window-status-style 'bg=colour236,fg=colour252'
set -g window-status-current-style 'bg=colour51,fg=black,bold'
set -g window-status-format ' #{window_name}#{?window_bell_flag,!,} '
set -g window-status-current-format ' #{window_name}#{?window_bell_flag,!,} '

set -g pane-border-format '#{?pane_active,#[bg=black#,fg=colour51],#[bg=black#,fg=colour240]} #(~/.local/bin/tmux-pane-label "#{pane_tty}" "#{pane_current_path}" "#{pane_current_command}" "#{pane_id}") '

setw -g monitor-activity off
set -g visual-activity off

set -g set-titles on
set -g set-titles-string '#S'
setw -g automatic-rename off
set -g allow-rename off
# Required by neovim
set-option -g focus-events on

# copy/paste
set -g set-clipboard on
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "osc52-copy"
bind-key -T copy-mode-vi 'Y' send -X copy-pipe-and-cancel "osc52-copy-oneline"
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "osc52-copy"
bind-key -T copy-mode 'y' send -X copy-pipe-and-cancel "osc52-copy"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
#
# Uses tmux's format-based if-shell (-F) against #{pane_current_command}
# instead of shelling out to `ps | grep`. Each C-h/j/k/l keystroke then
# costs zero forks, which matters a lot when fork+exec is slow on the host.
{% raw %}
is_vim='#{m:*vim*,#{pane_current_command}}'
bind-key -n 'C-h' if-shell -F "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell -F "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell -F "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell -F "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell -F "$is_vim" 'send-keys C-\\'  'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
{% endraw %}

# swap a pane with the current pane
{% raw %}bind-key s display-panes\; command-prompt -p "pane #: " "swap-pane -t '%%'"{% endraw %}

# Pick files with fzf and send to active pane
unbind-key C-p
unbind-key -T root C-p

bind-key -T root C-p \
  run-shell '/bin/echo #{pane_id} > /tmp/tmux-pick-files-pane' \; \
  if-shell -F "$is_vim" \
    'send-keys C-p' \
    'display-popup -E -w 95% -h 95% -d "#{pane_current_path}" pick-files'

# Allow escape sequences (notifications, progress bars) to pass through to the outer terminal
set -g allow-passthrough all

# Enable true color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Enable OSC 8 hyperlinks (requires tmux 3.4+)
set -ga terminal-features "*:hyperlinks"

# Tmux plugin manager and plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.tmux/plugins/"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect settings
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes '"claude --continue" ssh "~nvim" "~vim"'

# tmux-continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# Initialize tmux plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
