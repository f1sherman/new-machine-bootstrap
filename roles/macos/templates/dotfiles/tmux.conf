setw -g mode-keys vi

set -sg escape-time 0

# Keep root key bindings active in local TUI panes such as Codex.
set -s extended-keys off
set -g extended-keys-format csi-u

# Use zsh as default shell, as a non-login interactive shell. Skipping login
# mode means tmux doesn't fire .zprofile, .zlogin, /etc/zprofile, or /etc/zlogin
# — saves ~1s per new pane on macOS (path_helper is slow under load). Any
# env that used to live in .zprofile/.zlogin should be in .zshenv instead.
set -g default-shell {{ brew_prefix }}/bin/zsh
set -g default-command "exec {{ brew_prefix }}/bin/zsh -i"

# Capture PATH from attaching shell and run restore maintenance
set-hook -g client-attached 'run-shell -b "$HOME/.local/bin/tmux-client-attached \"$PATH\"; PATH=\"$HOME/.local/bin:/opt/homebrew/bin:/usr/local/bin:$PATH\" TMUX_HOOK_PANE_ID=#{pane_id} $HOME/.local/bin/tmux-hook-run $HOME/.local/bin/tmux-remote-title publish"'

# Keep remote-title and window labels in sync without renaming sessions.
# tmux-hook-run logs each failure to ~/.local/state/failures.log and (via
# report-pane-error) sets @pane-last-error on the originating pane so the
# status indicator surfaces the most recent failure. The wrapper always
# exits 0 — tmux never sees a failed hook.
set-hook -g pane-focus-in 'run-shell -b "TMUX_HOOK_PANE_ID=#{pane_id} $HOME/.local/bin/tmux-hook-run tmux-remote-title publish"; run-shell -b "TMUX_HOOK_PANE_ID=#{pane_id} $HOME/.local/bin/tmux-hook-run tmux-window-label #{pane_id}"; run-shell -b "TMUX_HOOK_PANE_ID=#{pane_id} $HOME/.local/bin/tmux-hook-run tmux-sync-pane-border-status #{pane_id}"; run-shell -b "TMUX_HOOK_PANE_ID=#{pane_id} $HOME/.local/bin/tmux-hook-run tmux-update-pane-label #{pane_id}"'
set-hook -g client-session-changed 'run-shell -b "TMUX_HOOK_PANE_ID=#{pane_id} $HOME/.local/bin/tmux-hook-run tmux-remote-title publish"; run-shell -b "TMUX_HOOK_PANE_ID=#{pane_id} $HOME/.local/bin/tmux-hook-run tmux-window-label #{pane_id}"; run-shell -b "TMUX_HOOK_PANE_ID=#{pane_id} $HOME/.local/bin/tmux-hook-run tmux-sync-pane-border-status #{pane_id}"; run-shell -b "TMUX_HOOK_PANE_ID=#{pane_id} $HOME/.local/bin/tmux-hook-run tmux-update-pane-label #{pane_id}"'
set-hook -g pane-title-changed 'if-shell -F "#{||:#{m:* | *,#{pane_title}},#{@pane-title-structured}}" "run-shell -b \"TMUX_HOOK_PANE_ID=#{hook_pane} $HOME/.local/bin/tmux-hook-run tmux-pane-title-changed #{hook_pane} #{pane_id}\""'

# Reconcile each session's status bar from all attached clients. Direct clients
# win over nested tmux/screen clients, and a session with no clients defaults on.
# A full pass on session changes repairs both the source and destination.
# Stable hook indices replace only this config's entries when sourced again.
set-hook -g client-attached[90] 'run-shell -b "$HOME/.local/bin/tmux-reconcile-status-bars"'
set-hook -g client-detached[90] 'run-shell -b "$HOME/.local/bin/tmux-reconcile-status-bars"'
set-hook -g client-session-changed[90] 'run-shell -b "$HOME/.local/bin/tmux-reconcile-status-bars"'

# Keep the regular Ghostty tab manifest current without a periodic LaunchAgent.
# The short delay lets Ghostty's AppleScript tab model settle, while the saver
# serializes event bursts and preserves the last-good manifest during app quit.
set-hook -g client-attached[95] 'run-shell -b "sleep 0.2; $HOME/.local/bin/ghostty-session-manifest-save || :"'
set-hook -g client-detached[95] 'run-shell -b "sleep 0.2; $HOME/.local/bin/ghostty-session-manifest-save || :"'
set-hook -g client-session-changed[95] 'run-shell -b "sleep 0.2; $HOME/.local/bin/ghostty-session-manifest-save || :"'
set-hook -g client-focus-in[95] 'run-shell -b "sleep 0.2; $HOME/.local/bin/ghostty-session-manifest-save || :"'

# Continuous pane logging. Fires on every newly created pane (including restore).
# tmux 3.6 lacks after-new-pane / session-window-linked, so use the equivalent
# concrete events: split-window (new pane), new-window/new-session (initial pane),
# and window-linked (window attached to session, e.g. on resurrect).
set-hook -g after-split-window 'run-shell -b "$HOME/.local/bin/tmux-pipe-pane-start #{pane_id}"; run-shell -b "TMUX_HOOK_PANE_ID=#{pane_id} $HOME/.local/bin/tmux-hook-run tmux-update-pane-label #{pane_id}"'
set-hook -g after-new-window 'run-shell -b "$HOME/.local/bin/tmux-pipe-pane-start #{pane_id}"; run-shell -b "TMUX_HOOK_PANE_ID=#{pane_id} $HOME/.local/bin/tmux-hook-run tmux-update-pane-label #{pane_id}"'
set-hook -g after-new-session 'run-shell -b "$HOME/.local/bin/tmux-pipe-pane-start #{pane_id}"; run-shell -b "TMUX_HOOK_PANE_ID=#{pane_id} $HOME/.local/bin/tmux-hook-run tmux-update-pane-label #{pane_id}"'
set-hook -g window-linked 'run-shell -b "$HOME/.local/bin/tmux-pipe-pane-start #{pane_id}"; run-shell -b "TMUX_HOOK_PANE_ID=#{pane_id} $HOME/.local/bin/tmux-hook-run tmux-update-pane-label #{pane_id}"'

{% raw %}bind -n M-\\ split-window -h -c '#{pane_current_path}'
{% endraw %}bind -n M-- split-window -v -c '#{pane_current_path}'
bind -n M-= select-layout even-horizontal
bind -n M-+ select-layout even-vertical
bind -n M-t new-window -a -c '#{pane_current_path}'
bind -n M-n next-window
bind -n M-p previous-window
bind -n M-, swap-window -d -t -1
bind -n M-. swap-window -d -t +1

bind-key -nr    M-Up resize-pane -U
bind-key -nr  M-Down resize-pane -D
bind-key -nr  M-Left resize-pane -L
bind-key -nr M-Right resize-pane -R

# Format-based (zero-fork) ssh detection, same pattern as is_vim below. The
# previous `ps -o args= -t | grep` took ~1-2s per keystroke on macOS, which
# showed up as a visible delay before M-y opened copy-mode.
#
# Two signals, OR'd:
#   1. pane_current_command contains "ssh" — bare ssh, autossh, sshpass, etc.
#   2. @is_remote_session per-pane option is non-empty — escape hatch for
#      wrapper scripts whose foreground process name doesn't contain "ssh"
#      (the wrapper sets the option for the lifetime of the connection and
#      unsets it on exit).
is_ssh='#{||:#{m:*ssh*,#{pane_current_command}},#{!=:#{@is_remote_session},}}'
is_nested_tmux='#{m:*tmux*,#{pane_current_command}}'
is_active_agent_tui='#{&&:#{m/r:^(claude|codex|pi)$,#{@agent_kind}},#{m/r:^(node|codex|claude|pi)$,#{pane_current_command}}}'
is_agent_key_passthrough='#{||:#{&&:#{m/r:^(claude|codex|pi)$,#{@agent_kind}},#{m/r:^(node|codex|claude|pi)$,#{pane_current_command}}},#{||:#{||:#{m:*ssh*,#{pane_current_command}},#{!=:#{@is_remote_session},}},#{m:*tmux*,#{pane_current_command}}}}'

bind-key -n M-PPage copy-mode -u

bind-key -n M-y if-shell -F "$is_ssh" 'send-keys M-y' 'copy-mode'
bind-key -n M-d if-shell -F "$is_agent_key_passthrough" 'send-keys M-d' 'run-shell -b "TMUX_PANE=#{pane_id} ~/.local/bin/review-diff"'
bind-key -n M-f if-shell -F "$is_agent_key_passthrough" 'send-keys M-f' 'run-shell -b "TMUX_PANE=#{pane_id} ~/.local/bin/tmux-spec-open"'
bind-key -n M-r if-shell -F "$is_agent_key_passthrough" 'send-keys M-r' 'run-shell -b "TMUX_PANE=#{pane_id} ~/.local/bin/tmux-review-toggle"'

# Smart upload: reads clipboard path, uploads if SSH'd, pastes result
bind-key -n M-u run-shell -b 'PATH="$HOME/.local/share/mise/shims:{{ brew_prefix }}/bin:/usr/local/bin:$PATH" && \
  tmux set-buffer "$(pbpaste)" && \
  result=$($HOME/.local/bin/smart-upload "$(tmux show-buffer)" "#{pane_tty}") && \
  tmux send-keys "$result"'

bind-key -n M-w display-popup -E -w 95% -h 90% tmux-switch-window
bind-key -n M-8 display-popup -E -w 60% -h 60% tmux-switch-session
bind-key -n M-9 switch-client -p
bind-key -n M-0 switch-client -n

# Pane error indicator: prefix + h opens the log and clears the badge on the active pane.
bind h display-popup -E -h 80% -w 80% "less +G ~/.local/state/failures.log" \; set-option -pqu @pane-last-error

set-option -g history-limit 100000


# Global status bar: on at the top. It carries a thin current-session window
# list while each pane keeps its own branch/path/host detail on the bottom
# border.
if -F '#{!=:#{@managed-bars},off}' 'set -g status on'
run-shell -b "$HOME/.local/bin/tmux-reconcile-status-bars"
set -g status-position top
# status-interval governs how often tmux re-renders the status bar — every
# `#(...)` shell-out embedded anywhere in status-left/right (including
# plugin injections like tmux-continuum's status_script) fires on this
# cadence. 60s instead of 5s reduces background process births 12× while
# still letting continuum's auto-save fire on its own cadence.
set -g status-interval 60
set -g status-justify left
set -g status-style 'bg=black,fg=colour252'
set -g status-left '#[bg=colour46,fg=black,bold] ❮ #S ❯ #[default] '
set -g status-right '#{?#{@pane-last-error}, #[bg=colour196#,fg=white#,bold] ! #{@pane-last-error} #[default],}'
set -g status-left-length 50
set -g status-right-length 80
set -g window-status-separator ' || '
if -F '#{!=:#{@managed-bars},off}' 'set -g pane-border-status bottom'

# Border line colors: dark grey for inactive, bright cyan for active.
# Both use black bg so the pane-border-format content sits on a consistent
# dark bar, matching the old status-bar's status-bg/status-fg.
set -g pane-border-style 'bg=black,fg=colour240'
set -g pane-active-border-style 'bg=black,fg=colour51'

set -g window-status-style 'bg=colour236,fg=colour252'
set -g window-status-current-style 'bg=colour51,fg=black,bold'
set -g window-status-activity-style 'bg=colour51,fg=black,bold'
set -g window-status-bell-style 'bg=colour51,fg=black,bold'
set -g window-status-format ' #{E:@window-indicators}#{?#{||:#{window_activity_flag},#{window_bell_flag}},#[fg=black#,nodim],#[fg=colour252#,nodim]}#{window_name}#{?window_bell_flag,!,} '
set -g window-status-current-format ' #{E:@window-indicators}#[fg=black,nodim]#{window_name}#{?window_bell_flag,!,} '

# pane-border-format reads the cached @pane-label. Repo-aware labels are written
# only by repo-start/repo-end via tmux-agent-worktree; otherwise show a simple
# cwd + host fallback without shelling out on every refresh.
set -g pane-border-format '#{?pane_active,#[bg=black#,fg=colour51],#[bg=black#,fg=colour240]} #{?#{@pane-link},#{@pane-link} ,}#{?#{@pane-label},#{@pane-label},#{b:pane_current_path} | #{host_short}}#{?#{@pane-last-error}, #[bg=colour196#,fg=white#,bold] ! #[default],} '

setw -g monitor-activity off
set -g visual-activity off

# Leave alternate-screen on (the tmux default): full-screen TUI programs rely on
# the alternate buffer for cursor-addressed redraws. With it off they repaint
# onto the scrolling main buffer, so their cursor math desyncs and the display
# garbles (stray line fragments, dropped characters) — worse over high-latency
# SSH. Program output reaches scrollback before the TUI takes over regardless.
setw -g alternate-screen on

set -g set-titles on
set -g set-titles-string '#S'
setw -g automatic-rename off
set -g allow-rename off
# Required by neovim
set-option -g focus-events on

# copy/paste
set -g set-clipboard on
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "osc52-copy"
bind-key -T copy-mode-vi 'Y' send -X copy-pipe-and-cancel "osc52-copy-oneline"
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "osc52-copy"
bind-key -T copy-mode 'y' send -X copy-pipe-and-cancel "osc52-copy"

# Smart pane switching with awareness of Vim splits and remote tmux panes.
# See: https://github.com/christoomey/vim-tmux-navigator
#
# Uses tmux's format-based if-shell (-F) against #{pane_current_command}
# instead of shelling out to `ps | grep`. Each C-h/j/k/l keystroke then
# costs zero forks, which matters a lot when fork+exec is slow on the host.
{% raw %}
is_vim='#{m:*vim*,#{pane_current_command}}'
is_remote_key_passthrough='#{||:#{||:#{m:*ssh*,#{pane_current_command}},#{!=:#{@is_remote_session},}},#{m:*tmux*,#{pane_current_command}}}'
# Agent TUIs (claude/codex/pi) are deliberately NOT in this predicate: C-h/j/k/l
# are pane-navigation keys and must select panes even when the pane runs an
# agent. Agent-specific helper keys (M-d/M-f/M-r) still pass through above.
is_vim_or_remote_key_passthrough='#{||:#{m:*vim*,#{pane_current_command}},#{||:#{||:#{m:*ssh*,#{pane_current_command}},#{!=:#{@is_remote_session},}},#{m:*tmux*,#{pane_current_command}}}}'
is_remote_at_left='#{&&:#{||:#{||:#{m:*ssh*,#{pane_current_command}},#{!=:#{@is_remote_session},}},#{m:*tmux*,#{pane_current_command}}},#{m/r:nmb-edge=[hjkl]*h,#{pane_title}}}'
is_remote_at_bottom='#{&&:#{||:#{||:#{m:*ssh*,#{pane_current_command}},#{!=:#{@is_remote_session},}},#{m:*tmux*,#{pane_current_command}}},#{m/r:nmb-edge=[hjkl]*j,#{pane_title}}}'
is_remote_at_top='#{&&:#{||:#{||:#{m:*ssh*,#{pane_current_command}},#{!=:#{@is_remote_session},}},#{m:*tmux*,#{pane_current_command}}},#{m/r:nmb-edge=[hjkl]*k,#{pane_title}}}'
is_remote_at_right='#{&&:#{||:#{||:#{m:*ssh*,#{pane_current_command}},#{!=:#{@is_remote_session},}},#{m:*tmux*,#{pane_current_command}}},#{m/r:nmb-edge=[hjkl]*l,#{pane_title}}}'
bind-key -n 'C-h' if-shell -F "$is_remote_at_left" 'select-pane -L' "if-shell -F \"$is_vim_or_remote_key_passthrough\" \"send-keys C-h\" \"select-pane -L\""
bind-key -n 'C-j' if-shell -F "$is_remote_at_bottom" 'select-pane -D' "if-shell -F \"$is_vim_or_remote_key_passthrough\" \"send-keys C-j\" \"select-pane -D\""
bind-key -n 'C-k' if-shell -F "$is_remote_at_top" 'select-pane -U' "if-shell -F \"$is_vim_or_remote_key_passthrough\" \"send-keys C-k\" \"select-pane -U\""
bind-key -n 'C-l' if-shell -F "$is_remote_at_right" 'select-pane -R' "if-shell -F \"$is_vim_or_remote_key_passthrough\" \"send-keys C-l\" \"select-pane -R\""
bind-key -n 'C-\' if-shell -F "$is_vim_or_remote_key_passthrough" 'send-keys C-\\'  'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
{% endraw %}

# swap a pane with the current pane
{% raw %}bind-key s display-panes\; command-prompt -p "pane #: " "swap-pane -t '%%'"{% endraw %}

# Pick files with fzf and send to active pane
unbind-key C-p
unbind-key -T root C-p

bind-key -T root C-p \
  run-shell '/bin/echo #{pane_id} > /tmp/tmux-pick-files-pane' \; \
  if-shell -F "$is_vim" \
    'send-keys C-p' \
    'display-popup -E -w 95% -h 95% -d "#{pane_current_path}" pick-files'

# Block inner programs from bypassing tmux to talk directly to the outer
# terminal. Keeps the Ghostty tab title pinned to '#S' instead of letting
# Claude Code, vim, ssh, etc. override it via DCS-wrapped OSC 2.
set -g allow-passthrough off

# Enable true color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Enable OSC 8 hyperlinks (requires tmux 3.4+)
set -ga terminal-features "*:hyperlinks"

# Tmux plugin manager and plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.tmux/plugins/"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect settings
set -g @resurrect-strategy-nvim 'nmb'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes '"claude --continue" ssh "~nvim" "~vim"'

# tmux-continuum settings.
# We keep continuum's periodic save (every @continuum-save-interval
# minutes) but disable its built-in auto-restore. Continuum's
# auto-restore decides whether to fire by counting tmux processes other
# than the current server; when several terminal windows launch tmux
# simultaneously on login, the count exceeds 1 (one per racing client),
# the heuristic concludes another server is running, and restore is
# silently skipped. tmux-attach-or-new instead invokes
# tmux-resurrect's restore.sh itself, under a lockfile, so exactly one
# launch performs the restore and the others wait then attach.
set -g @continuum-restore 'off'
# Periodic auto-save every 5 minutes. Continuum drives saves by injecting
# `#(continuum_save.sh)` into status-right; the script reads this option
# and exits early when not yet time to save. With status-interval bumped
# above, the per-refresh check-spawn fires once per minute instead of
# once per 5 seconds.
set -g @continuum-save-interval '5'

# Sidecar metadata + last.safe rotation. Helper handles both.
# Hook values are eval'd as SHELL commands by resurrect's execute_hook,
# not tmux commands — no `run-shell` wrapper.
set -g @resurrect-hook-post-save-layout '$HOME/.local/bin/tmux-resurrect-save-extra "$1"'

# Restore dispatcher: reads sidecar, invokes per-key handlers found on $PATH.
set -g @resurrect-hook-post-restore-all '$HOME/.local/bin/tmux-resurrect-restore-extra'

# Initialize tmux plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

# Instrument manual tmux-resurrect restores through the shared event log.
set -g @resurrect-restore-script-path "$HOME/.local/bin/tmux-resurrect-restore-wrapper"

# Populate @pane-label for any panes that already exist when this config
# loads (server restart, source-file). Per-pane updates are otherwise
# event-driven via the hooks above.
run-shell -b "$HOME/.local/bin/tmux-update-all-pane-labels"

# Manual refresh: prefix + L re-runs the labeler against every pane. Useful
# after starting a new long-running command inside a pane (claude/ssh/etc.)
# without leaving and re-entering the pane.
bind-key L run-shell -b "$HOME/.local/bin/tmux-update-all-pane-labels"
