---
- name: Bootstrap ssh config
  template:
    backup: yes
    force: no
    dest: '{{ ansible_facts["user_dir"] }}/.ssh/config'
    src: ssh/config
    mode: 0600
- name: Install XCode Command Line Tools
  command: xcode-select --install
  args:
    creates: /Library/Developer/CommandLineTools
- name: Create directories
  file:
    dest: '{{ ansible_facts["user_dir"] }}/.{{ item }}'
    state: directory
  with_items:
    - bundle
- name: Create fzf config directory
  file:
    dest: '{{ ansible_facts["user_dir"] }}/.config/fzf'
    state: directory
- name: Create bundler config file
  copy:
    backup: yes
    dest: '{{ ansible_facts["user_dir"] }}/.bundle/config'
    src: 'bundler/config'
    mode: 0600
- name: Create mise default-packages file
  copy:
    backup: yes
    dest: '{{ ansible_facts["user_dir"] }}/.default-npm-packages'
    src: 'mise/default-npm-packages'
    mode: 0600
- name: Create mise default-gems file
  copy:
    backup: yes
    dest: '{{ ansible_facts["user_dir"] }}/.default-gems'
    src: 'mise/default-ruby-gems'
    mode: 0600
- name: Resolve mise binary
  include_tasks: '{{ playbook_dir }}/roles/common/tasks/resolve_mise_binary.yml'
  when: mise_bin is not defined
- name: Configure mise settings
  shell: |
    "{{ mise_bin }}" settings set auto_install true
    "{{ mise_bin }}" settings set idiomatic_version_file_enable_tools '["ruby"]'
  changed_when: false

- name: 'Install Brew casks'
  homebrew_cask:
    name: [
      'alt-tab',
      'bitwarden',
      'brave-browser',
      'charles',
      'firefox',
      'ghostty',
      'istat-menus',
      'iterm2',
      'popclip',
      'rocket-typist',
      'sizeup',
      'slack',
      'snagit'
    ]
  register: brew_output
  failed_when: >
    brew_output is failed and
    (brew_output.msg is not search("It seems there is already an App at"))

- name: Check if pinned Node.js version is installed
  shell: "{{ mise_bin }} ls node | awk '$1 == \"node\" && $2 == \"{{ tool_versions.runtimes.node }}\" { found = 1 } END { exit(found ? 0 : 1) }'"
  register: macos_node_installed
  changed_when: false
  failed_when: false

- name: Import Node.js release signing keys for GPG verification
  shell: |
    gpg --keyserver hkps://keys.openpgp.org --recv-keys \
      4ED778F539E3634C779C87C6D7062848A1AB005C \
      141F07595B7B3FFE74309A937405533BE57C7D57 \
      74F12602B6F1C4E913FAA37AD3A89613643B6201 \
      DD792F5973C6DE52C432CBDAC77ABFA00DDAR22B \
      CC68F5A3106FF448322E48ED27F5E38D5B0A215F \
      8FCCA13FEF1D0C2E91008E09770F7A9A5AE15600 \
      890C08DB8579162FEE0DF9DB8BEAB4DFCF555EF4 \
      C82FA3AE1CBEDC6BE46B9360C43CEC45C17AB93C \
      108F52B48DB57BB0CC439B2997B01419BD92F80A \
      A363A499291CBBC940DD62E41F10027AF002F8B0 \
      86C8D74642E67846F8E120284DAA80D1E737BC9F
  when: macos_node_installed.rc != 0
  register: gpg_import
  changed_when: "'imported' in gpg_import.stderr"
  failed_when: false

- name: Install pinned Node.js version if not installed
  command: "{{ mise_bin }} install node@{{ tool_versions.runtimes.node }}"
  when: macos_node_installed.rc != 0

- name: Get current global Node.js version from mise config
  shell: grep '^node = ' ~/.config/mise/config.toml 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo ""
  register: current_global_node
  changed_when: false

- name: Set global Node.js version via mise if not set or outdated
  command: "{{ mise_bin }} use --global node@{{ tool_versions.runtimes.node }}"
  when: current_global_node.stdout != tool_versions.runtimes.node

- name: Create ghostty config directory
  file:
    dest: '{{ ansible_facts["user_dir"] }}/Library/Application Support/com.mitchellh.ghostty'
    state: directory
- name: Create .vimtmp directory
  file:
    path: '{{ ansible_facts["user_dir"] }}/.vimtmp'
    state: directory
- name: Configure ghostty
  lineinfile:
    path: '{{ ansible_facts["user_dir"] }}/Library/Application Support/com.mitchellh.ghostty/config'
    line: '{{ item }}'
    create: yes
    mode: 0644
  with_items:
    - 'clipboard-read = ask'
    - 'clipboard-write = allow'
    - 'confirm-close-surface = false'
    - 'copy-on-select = clipboard'
    - 'minimum-contrast = 1.1'
    - 'mouse-scroll-multiplier = 0.01'
    - 'scrollback-limit = 0'
    - 'term = xterm-256color'
- name: Configure ghostty macOS AppleScript support
  lineinfile:
    path: '{{ ansible_facts["user_dir"] }}/Library/Application Support/com.mitchellh.ghostty/config'
    regexp: '^macos-applescript\s*='
    line: 'macos-applescript = true'
    create: yes
    mode: 0644
- name: Configure ghostty command
  lineinfile:
    path: '{{ ansible_facts["user_dir"] }}/Library/Application Support/com.mitchellh.ghostty/config'
    regexp: '^command\s*='
    line: 'command = {{ ansible_facts["user_dir"] }}/.local/bin/tmux-attach-or-new'
    create: yes
    mode: 0644
- name: Configure ghostty window-save-state
  lineinfile:
    path: '{{ ansible_facts["user_dir"] }}/Library/Application Support/com.mitchellh.ghostty/config'
    regexp: '^window-save-state\s*='
    line: 'window-save-state = always'
    create: yes
    mode: 0644
- name: Create .vimtmp directory
  file:
    path: '{{ ansible_facts["user_dir"] }}/.vimtmp'
    state: directory
- name: Create projects directory
  file:
    path: '{{ ansible_facts["user_dir"] }}/projects'
    state: directory
- name: Create dotfile subdirectories
  file:
    path: '{{ ansible_facts["user_dir"] }}/.{{ item.path }}'
    state: directory
    mode: 0700
  with_filetree: templates/dotfiles/
  when: item.state == 'directory'
- name: Install dotfiles
  template:
    backup: no
    dest: '{{ ansible_facts["user_dir"] }}/.{{ item.path }}'
    src: '{{ item.src }}'
    mode: 0600
  with_filetree: templates/dotfiles/
  when: item.state == 'file'
  notify: Reload tmux config
- name: Clone tmux plugin manager (tpm)
  git:
    repo: 'https://github.com/tmux-plugins/tpm'
    dest: '{{ ansible_facts["user_dir"] }}/.tmux/plugins/tpm'
    depth: 1
    version: "{{ tool_versions.git_tags.tpm }}"
    update: yes
- name: Install tmux plugins via tpm
  shell: |
    # Start a temporary detached tmux session so the config loads and
    # set-environment sets TMUX_PLUGIN_MANAGER_PATH for install_plugins.
    tmux_was_running=false
    tmux list-sessions &>/dev/null && tmux_was_running=true
    tmux new-session -d -s tpm_install
    ~/.tmux/plugins/tpm/bin/install_plugins
    # Clean up: kill-server if we started it, otherwise try kill-session
    # (kill-session may miss renamed sessions from tmux-session-name hooks)
    if [ "$tmux_was_running" = false ]; then
      tmux kill-server 2>/dev/null || true
    else
      tmux kill-session -t tpm_install 2>/dev/null || true
    fi
  args:
    executable: /bin/bash
    creates: '{{ ansible_facts["user_dir"] }}/.tmux/plugins/tmux-resurrect'

- name: Enable Dark Mode
  command: dark-mode on
  changed_when: false
- name: Install prezto
  file:
    src: '{{item}}'
    dest: '{{ ansible_facts["user_dir"] }}/.{{ item | basename }}'
    state: link
  with_fileglob:
    - '{{ ansible_facts["user_dir"] }}/.zprezto/runcoms/^(README.md|zshrc|zpreztorc)'

- name: Configure macOS defaults
  include_tasks: defaults.yml

- name: Show the ~/Library folder
  command: chflags nohidden ~/Library
  changed_when: false

- name: Exclude ~/projects from Spotlight indexing
  file:
    path: '{{ ansible_facts["user_dir"] }}/projects/.metadata_never_index'
    state: touch
    modification_time: preserve
    access_time: preserve

- name: Remap Caps Lock to Control
  command: hidutil property --set '{"UserKeyMapping":[{"HIDKeyboardModifierMappingSrc":0x700000039,"HIDKeyboardModifierMappingDst":0x7000000E0}]}'
  changed_when: false

- name: Create LaunchAgents directory
  file:
    path: '{{ ansible_facts["user_dir"] }}/Library/LaunchAgents'
    state: directory
    mode: '0755'

- name: Install Caps Lock to Control LaunchAgent plist
  template:
    src: launchd/com.user.capslock-to-control.plist
    dest: '{{ ansible_facts["user_dir"] }}/Library/LaunchAgents/com.user.capslock-to-control.plist'
    mode: '0644'
  register: capslock_plist

- name: Unload Caps Lock to Control launchd job if changed
  command: launchctl unload {{ ansible_facts["user_dir"] }}/Library/LaunchAgents/com.user.capslock-to-control.plist
  when: capslock_plist.changed
  changed_when: false
  failed_when: false

- name: Load Caps Lock to Control launchd job
  command: launchctl load {{ ansible_facts["user_dir"] }}/Library/LaunchAgents/com.user.capslock-to-control.plist
  changed_when: false
  failed_when: false

- name: Install flushdns script
  copy:
    backup: yes
    dest: '{{ ansible_facts["user_dir"] }}/.local/bin/flushdns'
    src: 'bin/flushdns'
    mode: 0755
- name: Create "murder" script to try to gracefully kill processes
  template:
    dest: '{{ ansible_facts["user_dir"] }}/.local/bin/murder'
    src: templates/murder
    mode: '0755'
- name: Install ocr script
  copy:
    dest: '{{ ansible_facts["user_dir"] }}/.local/bin/ocr'
    src: 'bin/ocr'
    mode: 0755
- name: Install macOS-specific scripts
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ ansible_facts['user_dir'] }}/.local/bin/"
    mode: '0755'
  with_fileglob:
    - "bin/*"

- name: Install Ghostty layout save LaunchAgent plist
  template:
    src: launchd/com.user.ghostty-layout-save.plist
    dest: '{{ ansible_facts["user_dir"] }}/Library/LaunchAgents/com.user.ghostty-layout-save.plist'
    mode: '0644'
  register: ghostty_layout_save_plist

- name: Unload Ghostty layout save launchd job if changed
  command: launchctl unload {{ ansible_facts["user_dir"] }}/Library/LaunchAgents/com.user.ghostty-layout-save.plist
  when: ghostty_layout_save_plist.changed
  changed_when: false
  failed_when: false

- name: Load Ghostty layout save launchd job
  command: launchctl load {{ ansible_facts["user_dir"] }}/Library/LaunchAgents/com.user.ghostty-layout-save.plist
  changed_when: false
- name: Ensure Hammerspoon is installed
  homebrew:
    name: hammerspoon
    state: present

- name: Create Hammerspoon configuration directory if it does not exist
  file:
    path: ~/.hammerspoon
    state: directory
    mode: '0755'

- name: Configure Hammerspoon for Apple Music shortcuts
  copy:
    content: |
        -- init.lua
        hs.ipc.cliInstall()
        local appleMusic = "Music"

        -- Function to create a hotkey for Apple Music only
        local function bindAppleMusicHotkey(modifiers, key, action)
          local musicHotkey = hs.hotkey.new(modifiers, key, function()
            local frontApp = hs.application.frontmostApplication():name()
            if frontApp == appleMusic then
              action()
            end
          end)

          -- Initially disable the hotkey
          musicHotkey:disable()

          -- Watch for application focus changes
          local watcher = hs.application.watcher.new(function(name, event, app)
            if event == hs.application.watcher.activated then
              if name == appleMusic then
                musicHotkey:enable()
              else
                musicHotkey:disable()
              end
            end
          end)

          -- Start the watcher
          watcher:start()

          -- Check if Music is already running and active
          local currentApp = hs.application.frontmostApplication():name()
          if currentApp == appleMusic then
            musicHotkey:enable()
          end

          -- Return both objects so they don't get garbage collected
          return {hotkey = musicHotkey, watcher = watcher}
        end

        -- AppleScript for favoriting the current song
        local function favoriteCurrentSong()
          local script = [[
            tell application "Music"
              try
                set currentTrack to current track
                set favorited of currentTrack to true
                return "Success"
              on error errMsg
                return "Error: " & errMsg
              end try
            end tell
          ]]
          local success, result = hs.osascript.applescript(script)
        end

        -- AppleScript for suggesting less and skipping the current song
        local function suggestLessAndSkip()
          local script = [[
            tell application "Music"
              try
                set currentTrack to current track
                set favorited of currentTrack to false
                next track
                return "Success"
              on error errMsg
                return "Error: " & errMsg
              end try
            end tell
          ]]
          local success, result = hs.osascript.applescript(script)
        end

        -- Bind the hotkeys for Apple Music
        local likeHotkeyObjects = bindAppleMusicHotkey({"cmd"}, "L", favoriteCurrentSong)
        local dislikeHotkeyObjects = bindAppleMusicHotkey({"cmd"}, "D", suggestLessAndSkip)
    dest: ~/.hammerspoon/init.lua
    mode: '0644'

- name: Reload Hammerspoon configuration
  shell: hs -c 'hs.timer.doAfter(1, function() hs.reload() end)'
  args:
    executable: /bin/zsh
  changed_when: false

- name: Check if Meslo Powerline fonts are already installed
  stat:
    path: '{{ ansible_facts["user_dir"] }}/Library/Fonts/Meslo LG M Regular for Powerline.ttf'
  register: meslo_font_check

- name: Clone powerline fonts repository
  git:
    repo: 'https://github.com/powerline/fonts.git'
    dest: '/tmp/powerline-fonts'
    depth: 1
  when: not meslo_font_check.stat.exists

- name: Install Meslo LG Powerline fonts
  shell: |
    cp /tmp/powerline-fonts/Meslo\ Slashed/*.ttf {{ ansible_facts["user_dir"]}}/Library/Fonts/ && \
    cp /tmp/powerline-fonts/Meslo\ Dotted/*.ttf {{ ansible_facts["user_dir"] }}/Library/Fonts/
  when: not meslo_font_check.stat.exists

- name: Remove temporary fonts directory
  file:
    path: '/tmp/powerline-fonts'
    state: absent
  when: not meslo_font_check.stat.exists
