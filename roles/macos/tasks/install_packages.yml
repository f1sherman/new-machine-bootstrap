---
# macOS Package Installation - runs during pre_tasks
#
# Installs all packages required by common role:
# - fzf, git, nvim: required for vim plugin installation
# - rg, tmux, bat: used by scripts and dotfiles
# - zsh, prezto: required for shell configuration
#
# This file is imported during pre_tasks to ensure dependencies
# are available before the common role runs.

- name: Set brew prefix
  shell: 'brew --prefix'
  register: brew_prefix_output
  changed_when: false
  check_mode: false
- set_fact:
    brew_prefix: "{{ brew_prefix_output.stdout }}"

- name: Remove retired patched tmux formula
  homebrew:
    name: tmux-patched
    state: absent

- name: Remove retired local patched tmux tap
  file:
    path: "{{ brew_prefix }}/Library/Taps/local/homebrew-nmb"
    state: absent

- name: 'Install Brew packages'
  homebrew:
    name: [
      'bat',
      'coreutils',
      'curl',
      'dark-mode',
      'fd',
      'flock',
      'fzf',
      'gh',
      'git',
      'git-delta',
      'gnu-sed',
      'llm',
      'jq',
      'ncdu',
      'nmap',
      'neovim',
      'pam-reattach',
      'pandoc',
      'pipx',
      'python@3.13',
      'ripgrep',
      'rust',
      'shellcheck',
      'sqlparse',
      'ssh-copy-id',
      'tree',
      'tmux',
      'uv',
      'vim',
      'wget',
      'yamllint',
      'yq',
      'yt-dlp',
      'zoxide',
      'zsh'
    ]
    state: present
    update_homebrew: no

# A path-keyed outbound application firewall (e.g. Little Snitch) identifies a
# process by its executable path and code signature. Homebrew re-signs its mise
# bottle ad-hoc and embeds the version in the Cellar path, so every upgrade
# produces a fresh identity and a stale allow decision. Install the official
# Developer-ID build instead, which keeps a stable path and signing identity.
- name: Ensure Homebrew mise is absent (macOS)
  homebrew:
    name: mise
    state: absent

- name: Check for existing mise binary (macOS)
  shell: |
    candidates=(
      "{{ ansible_facts['user_dir'] }}/.local/bin/mise"
      "$(command -v mise 2>/dev/null || true)"
      "/opt/homebrew/bin/mise"
      "/usr/local/bin/mise"
    )
    for candidate in "${candidates[@]}"; do
      [ -n "$candidate" ] && [ -f "$candidate" ] && [ -x "$candidate" ] && echo "$candidate" && exit 0
    done
    exit 1
  args:
    executable: /bin/bash
  register: macos_mise_check
  changed_when: false
  failed_when: false

- name: Resolve existing mise binary path (macOS)
  set_fact:
    macos_mise_bin: "{{ macos_mise_check.stdout | trim if macos_mise_check.rc == 0 else '' }}"

- name: Check installed mise version (macOS)
  shell: "{{ macos_mise_bin }} --version | awk '{print $1}'"
  args:
    executable: /bin/bash
  register: macos_mise_version
  changed_when: false
  failed_when: false
  when: macos_mise_bin | length > 0

- name: Install mise (Developer-ID build)
  shell: curl -fsSL https://mise.run | sh
  args:
    executable: /bin/bash
  environment:
    MISE_VERSION: "{{ tool_versions.runtimes.mise }}"
  when:
    - macos_mise_bin | length == 0 or (macos_mise_version.stdout | default('')) != (tool_versions.runtimes.mise | regex_replace('^v', ''))

- name: Check which packages to remove are actually linked (not keg-only)
  shell: |
    for pkg in curl nodenv nvm rbenv; do
      if brew list --formula -1 2>/dev/null | grep -q "^${pkg}$"; then
        if ! brew info "$pkg" 2>/dev/null | grep -q 'keg-only'; then
          echo "$pkg"
        fi
      fi
    done
  register: brew_packages_to_remove
  changed_when: false

- name: 'Remove Brew packages'
  homebrew:
    name: "{{ brew_packages_to_remove.stdout_lines }}"
    state: absent
  when: brew_packages_to_remove.stdout_lines | length > 0

- name: Create fzf config directory
  file:
    path: '{{ ansible_facts["user_dir"] }}/.config/fzf'
    state: directory
    mode: 0755

- name: Check if llm-anthropic plugin is installed
  shell: llm plugins | jq -e '.[] | select(.name == "llm-anthropic")' > /dev/null 2>&1
  register: llm_anthropic_plugin_check
  changed_when: false
  failed_when: false

- name: Install llm-anthropic plugin
  command: llm install llm-anthropic
  when: llm_anthropic_plugin_check.rc != 0

- name: Check if Anthropic API key is configured in llm
  shell: llm keys list 2>/dev/null | grep -q '^anthropic$'
  register: llm_anthropic_key_check
  changed_when: false
  failed_when: false

- name: Check if Anthropic API key file exists
  stat:
    path: '{{ ansible_facts["user_dir"] }}/.config/api-keys/anthropic'
  register: anthropic_api_key_stat

- name: Read Anthropic API key from file
  slurp:
    src: '{{ ansible_facts["user_dir"] }}/.config/api-keys/anthropic'
  register: anthropic_api_key_content
  when: anthropic_api_key_stat.stat.exists and anthropic_api_key_stat.stat.size > 0

- name: Configure Anthropic API key for llm
  shell: echo "{{ anthropic_api_key_content.content | b64decode | trim }}" | llm keys set anthropic
  when: llm_anthropic_key_check.rc != 0 and anthropic_api_key_stat.stat.exists and anthropic_api_key_stat.stat.size > 0

- name: Remove llm default model pin
  file:
    path: '{{ ansible_facts["user_dir"] }}/Library/Application Support/io.datasette.llm/default_model.txt'
    state: absent
