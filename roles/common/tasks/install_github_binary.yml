---
# Install or update a binary from GitHub Releases.
# Tracks installed versions in a manifest file (default: ~/.local/share/github-releases.json,
# configurable via the optional manifest_path parameter).
#
# Required variables:
#   github_repo:    owner/repo (e.g. "junegunn/fzf")
#   binary_name:    manifest key and display name
#   asset_pattern:  release asset filename with {version}, {tag}, {arch} placeholders
#   install_dest:   target path (full file path for binary, directory for tarball)
#
# Optional variables:
#   download_type:        "binary" (default), "tarball", "deb", or "source"
#   pinned_release_tag:   pin to a specific release tag (e.g. "v0.10.4") instead of latest
#   arch_map:             dict mapping ansible architecture to download arch name
#                         default: {"x86_64": "amd64", "aarch64": "arm64", "arm64": "arm64"}
#   tarball_extra_args:   extra args for tar extraction (e.g. "--strip-components=1")
#   manifest_path:        full path to the manifest JSON file
#                         default: ~/.local/share/github-releases.json (per-user)
#                         override for system-wide installs (e.g. /var/lib/github-installs/manifest.json)
#   asset_url_template:   full URL template overriding the default URL build
#                         supports {repo}, {tag}, {version} placeholders
#                         when set, asset_pattern is ignored
#                         useful for projects publishing only auto-generated /archive/{tag}.tar.gz
#   build_commands:       (source mode only) list of shell commands to run sequentially
#   build_dir:            (source mode only) parent dir for extraction
#                         default: /tmp/_gh_{binary_name}_src
#   build_chdir_pattern:  (source mode only) subdir to chdir into before running build_commands
#                         default: {repo_name}-{version}
#                         supports {version}, {tag}, {repo_name} placeholders
#   build_cleanup:        (source mode only) remove build dir after success, default true

- name: "{{ binary_name }} | Resolve manifest path"
  set_fact:
    _gh_manifest_path: "{{ manifest_path | default(ansible_facts['user_dir'] + '/.local/share/github-releases.json') }}"

- name: "{{ binary_name }} | Ensure manifest directory exists"
  file:
    path: "{{ _gh_manifest_path | dirname }}"
    state: directory
    mode: '0755'

- name: "{{ binary_name }} | Read manifest"
  slurp:
    src: "{{ _gh_manifest_path }}"
  register: _gh_manifest_raw
  failed_when: false

- name: "{{ binary_name }} | Parse manifest"
  set_fact:
    _gh_manifest: "{{ (_gh_manifest_raw.content | b64decode | from_json) if (_gh_manifest_raw.content is defined) else {} }}"

- name: "{{ binary_name }} | Get latest release"
  uri:
    url: "https://api.github.com/repos/{{ github_repo }}/releases/latest"
    return_content: yes
    headers: "{{ {'Authorization': 'Bearer ' + _gh_api_token} if _gh_api_token else {} }}"
  register: _gh_latest_release
  retries: 3
  delay: 10
  until: _gh_latest_release is succeeded
  vars:
    _gh_api_token: "{{ ansible_facts['env']['GITHUB_TOKEN'] | default(ansible_facts['env']['GH_TOKEN'] | default('')) }}"
  when: (pinned_release_tag | default('')) == ''

- name: "{{ binary_name }} | Set version facts"
  set_fact:
    _gh_tag: "{{ pinned_release_tag if (pinned_release_tag | default('')) != '' else (_gh_latest_release.json.tag_name if (_gh_latest_release.json is defined) else '') }}"
    _gh_version: "{{ (pinned_release_tag if (pinned_release_tag | default('')) != '' else (_gh_latest_release.json.tag_name if (_gh_latest_release.json is defined) else '')) | regex_replace('^v', '') }}"

- name: "{{ binary_name }} | Check if update needed"
  set_fact:
    _gh_needs_update: "{{ _gh_version != '' and (_gh_manifest[binary_name] | default('')) != _gh_version }}"

- name: "{{ binary_name }} | Check if install destination exists"
  stat:
    path: "{{ install_dest }}"
  register: _gh_install_dest_stat
  when: not (_gh_needs_update | bool)

- name: "{{ binary_name }} | Force update if install destination missing"
  set_fact:
    _gh_needs_update: true
  when:
    - not (_gh_needs_update | bool)
    - _gh_install_dest_stat.stat is defined
    - not _gh_install_dest_stat.stat.exists

- name: "{{ binary_name }} | Resolve architecture"
  set_fact:
    _gh_arch: "{{ (arch_map | default({'x86_64': 'amd64', 'aarch64': 'arm64', 'arm64': 'arm64'}))[ansible_facts['architecture']] }}"
  when: _gh_needs_update

- name: "{{ binary_name }} | Build asset URL (default)"
  set_fact:
    _gh_asset_url: "https://github.com/{{ github_repo }}/releases/download/{{ _gh_tag }}/{{ asset_pattern | replace('{version}', _gh_version) | replace('{tag}', _gh_tag) | replace('{arch}', _gh_arch) }}"
  when: _gh_needs_update and (asset_url_template | default('')) == ''

- name: "{{ binary_name }} | Build asset URL (template override)"
  set_fact:
    _gh_asset_url: "{{ asset_url_template | replace('{repo}', github_repo) | replace('{tag}', _gh_tag) | replace('{version}', _gh_version) }}"
  when: _gh_needs_update and (asset_url_template | default('')) != ''

- name: "{{ binary_name }} | Download binary"
  get_url:
    url: "{{ _gh_asset_url }}"
    dest: "{{ install_dest }}"
    mode: '0755'
    force: yes
  retries: 3
  delay: 10
  when: _gh_needs_update and (download_type | default('binary')) == 'binary'

- name: "{{ binary_name }} | Download and extract tarball"
  unarchive:
    src: "{{ _gh_asset_url }}"
    dest: "{{ install_dest }}"
    remote_src: yes
    extra_opts: "{{ tarball_extra_args | default(omit) }}"
  retries: 3
  delay: 10
  when: _gh_needs_update and (download_type | default('binary')) == 'tarball'

- name: "{{ binary_name }} | Create temporary .deb path"
  tempfile:
    state: file
    prefix: "_gh_{{ binary_name }}."
    suffix: ".deb"
  register: _gh_deb_tempfile
  when: _gh_needs_update and (download_type | default('binary')) == 'deb'

- name: "{{ binary_name }} | Download .deb package"
  get_url:
    url: "{{ _gh_asset_url }}"
    dest: "{{ _gh_deb_tempfile.path }}"
  retries: 3
  delay: 10
  when: _gh_needs_update and (download_type | default('binary')) == 'deb'

- name: "{{ binary_name }} | Check .deb dependencies are satisfiable"
  shell: |
    dpkg-deb -f "{{ _gh_deb_tempfile.path }}" Depends | tr ',' '\n' | while read -r dep; do
      dep=$(echo "$dep" | xargs)
      [ -z "$dep" ] && continue
      pkg=$(echo "$dep" | awk '{print $1}')
      ver_constraint=$(echo "$dep" | grep -oP '\(>=\s*\K[^)]+' || true)
      if [ -n "$ver_constraint" ]; then
        installed=$(dpkg-query -W -f='${Version}' "$pkg" 2>/dev/null || echo "0")
        if ! dpkg --compare-versions "$installed" '>=' "$ver_constraint"; then
          echo "$pkg >= $ver_constraint required (have: $installed)"
          exit 1
        fi
      fi
    done
  args:
    executable: /bin/bash
  register: _gh_deb_depcheck
  failed_when: false
  changed_when: false
  when: _gh_needs_update and (download_type | default('binary')) == 'deb'

- name: "{{ binary_name }} | Warn if .deb dependencies not satisfiable"
  debug:
    msg: "Skipping {{ binary_name }} v{{ _gh_version }}: dependencies not satisfiable on this system"
  when:
    - _gh_needs_update
    - (download_type | default('binary')) == 'deb'
    - _gh_deb_depcheck.rc | default(0) != 0

- name: "{{ binary_name }} | Install .deb package"
  apt:
    deb: "{{ _gh_deb_tempfile.path }}"
  become: yes
  when: _gh_needs_update and (download_type | default('binary')) == 'deb' and _gh_deb_depcheck.rc | default(0) == 0

- name: "{{ binary_name }} | Clean up .deb package"
  file:
    path: "{{ _gh_deb_tempfile.path }}"
    state: absent
  when: _gh_needs_update and (download_type | default('binary')) == 'deb'

- name: "{{ binary_name }} | Resolve build directory (source mode)"
  set_fact:
    _gh_build_dir: "{{ build_dir | default('/tmp/_gh_' + binary_name + '_src') }}"
  when: _gh_needs_update and (download_type | default('binary')) == 'source'

- name: "{{ binary_name }} | Ensure build directory exists (source mode)"
  file:
    path: "{{ _gh_build_dir }}"
    state: directory
    mode: '0755'
  when: _gh_needs_update and (download_type | default('binary')) == 'source'

- name: "{{ binary_name }} | Download and extract source tarball (source mode)"
  unarchive:
    src: "{{ _gh_asset_url }}"
    dest: "{{ _gh_build_dir }}"
    remote_src: yes
  retries: 3
  delay: 10
  when: _gh_needs_update and (download_type | default('binary')) == 'source'

- name: "{{ binary_name }} | Resolve build chdir (source mode)"
  set_fact:
    _gh_build_chdir: >-
      {{ _gh_build_dir }}/{{
        (build_chdir_pattern | default('{repo_name}-{version}'))
        | replace('{version}', _gh_version)
        | replace('{tag}', _gh_tag)
        | replace('{repo_name}', github_repo.split('/')[-1])
      }}
  when: _gh_needs_update and (download_type | default('binary')) == 'source'

- name: "{{ binary_name }} | Run build commands (source mode)"
  command: "{{ item }}"
  args:
    chdir: "{{ _gh_build_chdir }}"
  loop: "{{ build_commands | default([]) }}"
  when: _gh_needs_update and (download_type | default('binary')) == 'source'

- name: "{{ binary_name }} | Clean up build directory (source mode)"
  file:
    path: "{{ _gh_build_dir }}"
    state: absent
  when:
    - _gh_needs_update
    - (download_type | default('binary')) == 'source'
    - build_cleanup | default(true) | bool

- name: "{{ binary_name }} | Update manifest"
  copy:
    content: "{{ _gh_manifest | combine({binary_name: _gh_version}) | to_nice_json }}\n"
    dest: "{{ _gh_manifest_path }}"
    mode: '0644'
  when: _gh_needs_update and (_gh_deb_depcheck.rc | default(0)) == 0
