- name: Install git-switch-branch script
  copy:
    backup: yes
    dest: '{{ ansible_facts["user_dir"] }}/.local/bin/git-switch-branch'
    src: '{{ playbook_dir }}/roles/common/files/bin/git-switch-branch'
