- name: Install or update Codex CLI via npm (macOS)
  npm:
    name: '@openai/codex'
    global: yes
    state: latest
  when: ansible_facts["os_family"] == "Darwin"

# Use mise exec to run npm with mise's node (not nvm's).
# mise activate relies on PROMPT_COMMAND which doesn't fire in Ansible's
# non-interactive shell, so we use mise exec instead.
# PATH is extended because mise may have been installed during pre_tasks
# and isn't in the inherited PATH yet.
- name: Install or update Codex CLI via npm (Linux)
  shell: "{{ mise_bin }} exec node@{{ tool_versions.runtimes.node }} -- npm install -g @openai/codex@latest"
  environment:
    PATH: "{{ ansible_facts['user_dir'] }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  when: ansible_facts["os_family"] == "Debian"
  changed_when: false

- name: Install or update pi-coding-agent via npm (macOS)
  npm:
    name: '@mariozechner/pi-coding-agent'
    global: yes
    state: latest
  when: ansible_facts["os_family"] == "Darwin"

- name: Install or update pi-coding-agent via npm (Linux)
  shell: "{{ mise_bin }} exec node@{{ tool_versions.runtimes.node }} -- npm install -g @mariozechner/pi-coding-agent@latest"
