- name: Enforce 0600 on ~/.claude/settings.json
  file:
    path: '{{ ansible_facts["user_dir"] }}/.claude/settings.json'
    mode: '0600'

- name: Prepare pinned Node.js before common Node package tools (macOS)
  block:
    - name: Create mise default-packages file before common Node package tools (macOS)
      copy:
        backup: yes
        dest: '{{ ansible_facts["user_dir"] }}/.default-npm-packages'
        src: '{{ playbook_dir }}/roles/macos/files/mise/default-npm-packages'
        mode: '0600'

    - name: Heal any broken mise-managed Node.js installs before common Node package tools (macOS)
      include_tasks: '{{ playbook_dir }}/roles/common/tasks/heal_mise_node_installs.yml'

    - name: Check if pinned Node.js version is listed before common Node package tools (macOS)
      shell: "{{ mise_bin }} ls --installed node | awk '$1 == \"node\" && $2 == \"{{ tool_versions.runtimes.node }}\" { found = 1 } END { exit(found ? 0 : 1) }'"
      register: common_macos_node_listed
      changed_when: false
      failed_when: false

    - name: Create temporary GPG home for pinned Node.js before common Node package tools (macOS)
      tempfile:
        state: directory
        prefix: common-macos-node-pin-gpg-
      register: common_macos_node_pin_gpg_home
      when: common_macos_node_listed.rc != 0

    - name: Install pinned Node.js version before common Node package tools (macOS)
      command: "{{ mise_bin }} install node@{{ tool_versions.runtimes.node }}"
      environment:
        GNUPGHOME: "{{ common_macos_node_pin_gpg_home.path }}"
      when:
        - common_macos_node_listed.rc != 0
        - common_macos_node_pin_gpg_home.path is defined
  always:
    - name: Remove temporary GPG home for pinned Node.js before common Node package tools (macOS)
      file:
        path: "{{ common_macos_node_pin_gpg_home.path }}"
        state: absent
      when:
        - common_macos_node_pin_gpg_home is defined
        - common_macos_node_pin_gpg_home.path is defined
  when: ansible_facts["os_family"] == "Darwin"

- name: Check if pinned aube version is installed (macOS)
  command: "{{ mise_bin }} where aube@{{ tool_versions.runtimes.aube }}"
  register: macos_aube_installed
  changed_when: false
  failed_when: false
  when: ansible_facts["os_family"] == "Darwin"

- name: Install aube via mise (macOS)
  command: "{{ mise_bin }} install aube@{{ tool_versions.runtimes.aube }}"
  changed_when: false
  when:
    - ansible_facts["os_family"] == "Darwin"
    - macos_aube_installed.rc != 0

- name: Set global aube version via mise (macOS)
  command: "{{ mise_bin }} use --global aube@{{ tool_versions.runtimes.aube }}"
  changed_when: false
  when: ansible_facts["os_family"] == "Darwin"

- name: Resolve pinned mise Node.js path for aube global tools (macOS)
  command: "{{ mise_bin }} where node@{{ tool_versions.runtimes.node }}"
  register: common_aube_global_tools_node_path_macos
  changed_when: false
  when: ansible_facts["os_family"] == "Darwin"

- name: Install managed mise npm tools through aube
  command: "{{ mise_bin }} --cd {{ ansible_facts['user_dir'] }} install --yes"
  environment:
    AUBE_PARANOID: "true"
    # Codex tracks "latest", so a release under the 24h paranoid age gate would
    # otherwise hard-fail the install (strict mode won't fall back). Codex also
    # ships its binary as same-day per-platform packages, and aube gates the
    # whole declared optionalDependencies graph regardless of host platform, so
    # every platform package must be exempted alongside the meta package.
    AUBE_MINIMUM_RELEASE_AGE_EXCLUDE: "@openai/codex,@openai/codex-darwin-arm64,@openai/codex-darwin-x64,@openai/codex-linux-x64,@openai/codex-linux-arm64,@openai/codex-win32-x64,@openai/codex-win32-arm64"
    MISE_NPM_PACKAGE_MANAGER: aube
    PATH: "{{ ansible_facts['user_dir'] }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  register: common_mise_managed_tool_install_result
  until: common_mise_managed_tool_install_result.rc == 0
  retries: 3
  delay: 10
  changed_when: false

- name: Install pi-subdir-context plugin for pi-coding-agent (macOS)
  command: "{{ mise_bin }} exec node@{{ tool_versions.runtimes.node }} -- pi install npm:pi-subdir-context"
  register: pi_plugin_macos
  changed_when: "'already installed' not in pi_plugin_macos.stdout"
  failed_when: pi_plugin_macos.rc != 0
  when: ansible_facts["os_family"] == "Darwin"

- name: Install pi-subdir-context plugin for pi-coding-agent (Linux)
  shell: "{{ mise_bin }} exec node@{{ tool_versions.runtimes.node }} -- pi install npm:pi-subdir-context"
  register: pi_plugin_linux
  environment:
    PATH: "{{ ansible_facts['user_dir'] }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  changed_when: "'already installed' not in pi_plugin_linux.stdout"
  failed_when: pi_plugin_linux.rc != 0
  when: ansible_facts["os_family"] == "Debian"

- name: Create pi-coding-agent global extensions directory
  file:
    path: "{{ ansible_facts['user_dir'] }}/.pi/agent/extensions"
    state: directory
    mode: '0755'

- name: Install managed pi-coding-agent keybindings
  copy:
    dest: "{{ ansible_facts['user_dir'] }}/.pi/agent/keybindings.json"
    mode: '0644'
    content: |
      {
        "tui.input.newLine": ["shift+enter", "ctrl+n"]
      }

- name: Install managed pi-coding-agent hooks
  copy:
    src: pi/extensions/managed-hooks.ts
    dest: "{{ ansible_facts['user_dir'] }}/.pi/agent/extensions/managed-hooks.ts"
    mode: '0644'

- name: Link pi-coding-agent into the active mise Node.js global package tree
  shell: |
    set -euo pipefail

    pi_bin="$("{{ mise_bin }}" where 'npm:@earendil-works/pi-coding-agent')/bin/pi"
    export PI_BIN="$pi_bin"

    IFS=' ' read -r -a ruby_cmd <<<"${RUBY_BIN:?}"
    "${ruby_cmd[@]}" <<'RUBY'
    require "fileutils"
    require "pathname"

    pi_bin = Pathname.new(ENV.fetch("PI_BIN")).realpath
    package_root = pi_bin.dirname.dirname
    expected = Pathname.new(ENV.fetch("NODE_PATH")).join("lib/node_modules/@earendil-works/pi-coding-agent")

    FileUtils.mkdir_p(expected.dirname)
    if expected.symlink? || expected.exist?
      current = expected.realpath.to_s rescue nil
      exit 0 if current == package_root.to_s
      abort "#{expected} already exists and points to #{current || 'a non-symlink path'}"
    end

    FileUtils.ln_s(package_root.to_s, expected.to_s)
    puts "changed"
    RUBY
  args:
    executable: /bin/bash
  environment:
    RUBY_BIN: "{{ mise_bin }} exec ruby@{{ tool_versions.runtimes.ruby }} -- ruby"
    NODE_PATH: "{{ (ansible_facts['os_family'] == 'Darwin') | ternary(common_aube_global_tools_node_path_macos.stdout, common_aube_global_tools_node_path_linux.stdout) }}"
  register: common_pi_coding_agent_global_node_link
  changed_when: common_pi_coding_agent_global_node_link.stdout.strip() == 'changed'

# Symlink globally-installed Node package binaries into ~/.local/bin so they work
# regardless of which Node version the current directory's mise.toml selects.
- name: Create ~/.local/bin symlinks for managed npm tools (Linux)
  shell: |
    set -euo pipefail
    codex_bin="$("{{ mise_bin }}" where 'npm:@openai/codex')/bin/codex"
    pi_bin="$("{{ mise_bin }}" where 'npm:@earendil-works/pi-coding-agent')/bin/pi"
    ln -sf "$codex_bin" "{{ ansible_facts['user_dir'] }}/.local/bin/codex"
    ln -sf "$pi_bin" "{{ ansible_facts['user_dir'] }}/.local/bin/pi"
  args:
    executable: /bin/bash
  changed_when: false
  when: ansible_facts["os_family"] == "Debian"

- name: Set Codex CLI reasoning defaults in ~/.codex/config.toml
  shell: |
    set -euo pipefail

    IFS=' ' read -r -a ruby_cmd <<<"${RUBY_BIN:?}"
    "${ruby_cmd[@]}" <<'RUBY'
    require "fileutils"

    config_file = ENV.fetch("CONFIG_FILE")
    text = File.exist?(config_file) ? File.read(config_file) : ""
    lines = text.lines(chomp: true)
    section_header = /^\[[^\]]+\](?:\s*[#;].*)?$/

    root_lines = []
    index = 0
    while index < lines.length && lines[index] !~ section_header
      root_lines << lines[index]
      index += 1
    end

    filtered_root = []
    root_lines.each do |line|
      stripped = line.strip
      next if stripped.match?(/^model\s*=/) && !stripped.start_with?("#", ";")
      next if stripped.match?(/^model_reasoning_effort\s*=/) && !stripped.start_with?("#", ";")

      filtered_root << line
    end

    insertion_index = 0
    while insertion_index < filtered_root.length
      stripped = filtered_root[insertion_index].strip
      break unless stripped.empty? || stripped.start_with?("#", ";")

      insertion_index += 1
    end

    filtered_root.insert(
      insertion_index,
      'model_reasoning_effort = "medium"'
    )

    new_lines = filtered_root + (lines[index..] || [])
    new_text = new_lines.empty? ? "" : "#{new_lines.join("\n")}\n"

    if new_text != text
      FileUtils.mkdir_p(File.dirname(config_file))
      File.write(config_file, new_text)
      File.chmod(0o600, config_file)
      puts "changed"
    else
      puts "unchanged"
    end
    RUBY
  args:
    executable: /bin/bash
  environment:
    CONFIG_FILE: '{{ ansible_facts["user_dir"] }}/.codex/config.toml'
    RUBY_BIN: '{{ mise_bin }} exec ruby@{{ tool_versions.runtimes.ruby }} -- ruby'
  register: codex_model_defaults_result
  changed_when: codex_model_defaults_result.stdout.strip() == 'changed'

- name: Configure Codex CLI Vim mode in ~/.codex/config.toml
  shell: |
    set -euo pipefail

    IFS=' ' read -r -a ruby_cmd <<<"${RUBY_BIN:?}"
    "${ruby_cmd[@]}" <<'RUBY'
    require "fileutils"

    config_file = ENV.fetch("CONFIG_FILE")
    text = File.exist?(config_file) ? File.read(config_file) : ""
    lines = text.lines(chomp: true)
    section_header = /^\[(?:\[(?<array_name>[^\]]+)\]|(?<name>[^\]]+))\](?:\s*[#;].*)?$/

    section_name = lambda do |line|
      match = line.strip.match(section_header)
      match ? (match[:name] || match[:array_name]) : nil
    end

    commented = lambda do |line|
      line.strip.start_with?("#", ";")
    end

    inline_tui_table = lambda do |line|
      !commented.call(line) && line.match?(/^\s*tui\s*=\s*\{.*\}\s*(?:[#;].*)?$/)
    end

    dotted_tui_key = lambda do |line|
      !commented.call(line) && line.match?(/^\s*tui\s*\./)
    end

    dotted_tui_vim_mode = lambda do |line|
      !commented.call(line) && line.match?(/^\s*tui\s*\.\s*vim_mode_default\s*=/)
    end

    root_lines = []
    index = 0
    while index < lines.length && section_name.call(lines[index]).nil?
      root_lines << lines[index]
      index += 1
    end

    output = []
    found_tui = false

    if root_lines.any? { |line| inline_tui_table.call(line) }
      found_tui = true
      output.concat(
        root_lines.map do |line|
          next line unless inline_tui_table.call(line)

          if line.match?(/([,{]\s*)vim_mode_default\s*=\s*(?:true|false|"[^"]*"|\x27[^\x27]*\x27)/)
            line.sub(/([,{]\s*)vim_mode_default\s*=\s*(?:true|false|"[^"]*"|\x27[^\x27]*\x27)/, "\\1vim_mode_default = true")
          else
            line.sub(/\s*\}(\s*(?:[#;].*)?)$/) do
              table_end = Regexp.last_match(1)
              prefix = line.match?(/\{\s*\}/) ? " vim_mode_default = true " : ", vim_mode_default = true "
              prefix + "}" + table_end
            end
          end
        end
      )
    elsif root_lines.any? { |line| dotted_tui_key.call(line) }
      found_tui = true
      vim_mode_seen = false
      last_tui_index = nil

      root_lines.each do |line|
        if dotted_tui_vim_mode.call(line)
          unless vim_mode_seen
            output << line.sub(/=\s*.*/, "= true")
            vim_mode_seen = true
          end
          next
        end

        last_tui_index = output.length if dotted_tui_key.call(line)
        output << line
      end

      output.insert((last_tui_index || output.length - 1) + 1, "tui.vim_mode_default = true") unless vim_mode_seen
    else
      output.concat(root_lines)
    end

    while index < lines.length
      line = lines[index]

      if section_name.call(line) == "tui"
        found_tui = true
        output << line
        index += 1

        section_lines = []
        while index < lines.length && section_name.call(lines[index]).nil?
          section_lines << lines[index]
          index += 1
        end

        section_output = []
        vim_mode_seen = false
        section_lines.each do |section_line|
          stripped = section_line.strip

          if !commented.call(section_line) && stripped.match?(/^vim_mode_default\s*=/)
            unless vim_mode_seen
              section_output << "vim_mode_default = true"
              vim_mode_seen = true
            end
            next
          end

          section_output << section_line
        end

        unless vim_mode_seen
          insertion_index = 0
          while insertion_index < section_output.length
            stripped = section_output[insertion_index].strip
            break unless stripped.empty? || stripped.start_with?("#", ";")

            insertion_index += 1
          end
          section_output.insert(insertion_index, "vim_mode_default = true")
        end

        output.concat(section_output)
        next
      end

      output << line
      index += 1
    end

    unless found_tui
      output << "" if !output.empty? && output[-1] != ""
      output << "[tui]"
      output << "vim_mode_default = true"
    end

    new_text = "#{output.join("\n")}\n"

    if new_text != text
      FileUtils.mkdir_p(File.dirname(config_file))
      File.write(config_file, new_text)
      File.chmod(0o600, config_file)
      puts "changed"
    else
      puts "unchanged"
    end
    RUBY
  args:
    executable: /bin/bash
  environment:
    CONFIG_FILE: '{{ ansible_facts["user_dir"] }}/.codex/config.toml'
    RUBY_BIN: '{{ mise_bin }} exec ruby@{{ tool_versions.runtimes.ruby }} -- ruby'
  register: codex_vim_mode_result
  changed_when: codex_vim_mode_result.stdout.strip() == 'changed'

# Trust settings for shared workspaces and ~/projects/
- name: Configure Codex CLI config.toml for shared workspaces
  shell: |
    python3 -c '
    import os
    import glob

    config_file = os.environ["CONFIG_FILE"]

    existing_projects = set()
    if os.path.exists(config_file):
      with open(config_file, "r") as f:
        for line in f:
          if line.startswith("[projects."):
            start = line.find("\"")
            end = line.rfind("\"")
            if start != -1 and end != -1 and start < end:
              existing_projects.add(line[start+1:end])

    changed = False
    new_sections = []

    for workspace_dir in glob.glob("/workspaces/*"):
      if os.path.isdir(workspace_dir) and workspace_dir not in existing_projects:
        new_sections.append(f"\n[projects.\"{workspace_dir}\"]\n")
        new_sections.append("trust_level = \"trusted\"\n")
        changed = True

    if changed:
      with open(config_file, "a") as f:
        f.writelines(new_sections)
      os.chmod(config_file, 0o600)
      print("changed")
    else:
      print("unchanged")
    '
  environment:
    CONFIG_FILE: '{{ ansible_facts["user_dir"] }}/.codex/config.toml'
  register: codex_config_workspace_result
  changed_when: codex_config_workspace_result.stdout.strip() == 'changed'
  when: ansible_facts["os_family"] == "Debian"

- name: Configure Codex CLI config.toml for ~/projects/
  shell: |
    python3 -c '
    import os
    import glob

    config_file = os.environ["CONFIG_FILE"]
    projects_dir = os.path.expanduser("~/projects")

    existing_projects = set()
    if os.path.exists(config_file):
      with open(config_file, "r") as f:
        for line in f:
          if line.startswith("[projects."):
            start = line.find("\"")
            end = line.rfind("\"")
            if start != -1 and end != -1 and start < end:
              existing_projects.add(line[start+1:end])

    changed = False
    new_sections = []

    if os.path.isdir(projects_dir):
      for project_dir in glob.glob(os.path.join(projects_dir, "*")):
        if os.path.isdir(project_dir) and project_dir not in existing_projects:
          new_sections.append(f"\n[projects.\"{project_dir}\"]\n")
          new_sections.append("trust_level = \"trusted\"\n")
          changed = True

    if changed:
      with open(config_file, "a") as f:
        f.writelines(new_sections)
      os.chmod(config_file, 0o600)
      print("changed")
    else:
      print("unchanged")
    '
  environment:
    CONFIG_FILE: '{{ ansible_facts["user_dir"] }}/.codex/config.toml'
  register: codex_config_projects_result
  changed_when: codex_config_projects_result.stdout.strip() == 'changed'

- name: Enable Codex hooks in ~/.codex/config.toml
  shell: |
    set -euo pipefail

    IFS=' ' read -r -a ruby_cmd <<<"${RUBY_BIN:?}"
    "${ruby_cmd[@]}" <<'RUBY'
    require "fileutils"

    config_file = ENV.fetch("CONFIG_FILE")
    text = File.exist?(config_file) ? File.read(config_file) : ""
    lines = text.lines(chomp: true)
    section_header = /^\[(?:\[(?<array_name>[^\]]+)\]|(?<name>[^\]]+))\](?:\s*[#;].*)?$/

    section_name = lambda do |line|
      match = line.strip.match(section_header)
      match ? (match[:name] || match[:array_name]) : nil
    end

    output = []
    index = 0
    found_features = false

    while index < lines.length
      line = lines[index]

      if section_name.call(line) == "features"
        found_features = true
        output << line
        index += 1

        section_lines = []
        while index < lines.length && section_name.call(lines[index]).nil?
          section_lines << lines[index]
          index += 1
        end

        section_output = []
        hooks_seen = false
        section_lines.each do |section_line|
          stripped = section_line.strip
          commented = stripped.start_with?("#", ";")

          if !commented && stripped.match?(/^codex_hooks\s*=/)
            next
          end

          if !commented && stripped.match?(/^hooks\s*=/)
            unless hooks_seen
              section_output << "hooks = true"
              hooks_seen = true
            end
            next
          end

          section_output << section_line
        end

        unless hooks_seen
          insertion_index = 0
          while insertion_index < section_output.length
            stripped = section_output[insertion_index].strip
            break unless stripped.empty? || stripped.start_with?("#", ";")

            insertion_index += 1
          end
          section_output.insert(insertion_index, "hooks = true")
        end

        output.concat(section_output)
        next
      end

      output << line
      index += 1
    end

    unless found_features
      output << "" if !output.empty? && output[-1] != ""
      output << "[features]"
      output << "hooks = true"
    end

    new_text = "#{output.join("\n")}\n"

    if new_text != text
      FileUtils.mkdir_p(File.dirname(config_file))
      File.write(config_file, new_text)
      File.chmod(0o600, config_file)
      puts "changed"
    else
      puts "unchanged"
    end
    RUBY
  args:
    executable: /bin/bash
  environment:
    CONFIG_FILE: '{{ ansible_facts["user_dir"] }}/.codex/config.toml'
    RUBY_BIN: '{{ mise_bin }} exec ruby@{{ tool_versions.runtimes.ruby }} -- ruby'
  register: codex_feature_hooks_result
  changed_when: codex_feature_hooks_result.stdout.strip() == 'changed'

- name: Enforce 0600 on ~/.codex/config.toml
  file:
    path: '{{ ansible_facts["user_dir"] }}/.codex/config.toml'
    mode: '0600'

- name: Merge managed Codex worktree hook into ~/.codex/hooks.json
  shell: |
    set -euo pipefail

    hooks_file="${HOOKS_FILE:?}"
    managed_command='~/.local/bin/codex-block-worktree-commands'

    if [ -f "$hooks_file" ] && jq -e --arg cmd "$managed_command" '
      .hooks.PreToolUse // []
      | any(.matcher == "Bash" and any(.hooks[]?; .type == "command" and .command == $cmd))
    ' "$hooks_file" >/dev/null 2>&1; then
      echo "unchanged"
      exit 0
    fi

    managed_entry="$(
      jq -n --arg cmd "$managed_command" '{
        matcher: "Bash",
        hooks: [
          {
            type: "command",
            command: $cmd
          }
        ]
      }'
    )"
    tmp_file="$(mktemp)"

    if [ -f "$hooks_file" ] && [ -s "$hooks_file" ]; then
      jq --argjson entry "$managed_entry" '
        .hooks //= {} |
        .hooks.PreToolUse = ((.hooks.PreToolUse // []) + [$entry])
      ' "$hooks_file" > "$tmp_file"
    else
      jq -n --argjson entry "$managed_entry" '
        {hooks: {PreToolUse: [$entry]}}
      ' > "$tmp_file"
    fi

    mv "$tmp_file" "$hooks_file"
    chmod 600 "$hooks_file"
    echo "changed"
  args:
    executable: /bin/bash
  environment:
    HOOKS_FILE: '{{ ansible_facts["user_dir"] }}/.codex/hooks.json'
  register: codex_hooks_json_result
  changed_when: codex_hooks_json_result.stdout.strip() == 'changed'

