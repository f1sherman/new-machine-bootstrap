- name: Merge managed Codex current spec hook into ~/.codex/hooks.json
  shell: |
    set -euo pipefail

    hooks_file="${HOOKS_FILE:?}"
    managed_command='~/.local/bin/agent-current-spec-hook'
    matcher='Bash|apply_patch|Edit|MultiEdit|Read|Write|shell_command'

    managed_entry="$(
      jq -n --arg cmd "$managed_command" --arg matcher "$matcher" '{
        matcher: $matcher,
        hooks: [
          {
            type: "command",
            command: $cmd
          }
        ]
      }'
    )"
    tmp_file="$(mktemp)"

    if [ ! -s "$hooks_file" ]; then
      echo '{}' > "$hooks_file"
    fi

    jq --arg cmd "$managed_command" --argjson entry "$managed_entry" '
      .hooks //= {} |
      .hooks.PostToolUse = (((.hooks.PostToolUse // [])
        | map(.hooks = ((.hooks // []) | map(select(.type != "command" or .command != $cmd))))
        | map(select((.hooks // []) | length > 0))) + [$entry])
    ' "$hooks_file" > "$tmp_file"

    if jq -e --slurp '.[0] == .[1]' "$hooks_file" "$tmp_file" >/dev/null; then
      rm "$tmp_file"
      echo "unchanged"
    else
      mv "$tmp_file" "$hooks_file"
      chmod 600 "$hooks_file"
      echo "changed"
    fi
  args:
    executable: /bin/bash
  environment:
    HOOKS_FILE: '{{ ansible_facts["user_dir"] }}/.codex/hooks.json'
  register: codex_current_spec_hooks_json_result
  changed_when: codex_current_spec_hooks_json_result.stdout.strip() == 'changed'

- name: Remove Codex current spec UserPromptSubmit hook
  shell: |
    set -euo pipefail

    hooks_file="${HOOKS_FILE:?}"
    managed_command='~/.local/bin/agent-current-spec-hook'

    if [ ! -f "$hooks_file" ]; then
      echo "unchanged"
      exit 0
    fi

    tmp_file="$(mktemp)"

    jq --arg cmd "$managed_command" '
      .hooks //= {} |
      .hooks.UserPromptSubmit = ((.hooks.UserPromptSubmit // [])
        | map(.hooks = ((.hooks // []) | map(select(.type != "command" or .command != $cmd))))
        | map(select((.hooks // []) | length > 0))) |
      if (.hooks.UserPromptSubmit | length) == 0 then del(.hooks.UserPromptSubmit) else . end
    ' "$hooks_file" > "$tmp_file"

    if jq -e --slurp '.[0] == .[1]' "$hooks_file" "$tmp_file" >/dev/null; then
      rm "$tmp_file"
      echo "unchanged"
    else
      mv "$tmp_file" "$hooks_file"
      chmod 600 "$hooks_file"
      echo "changed"
    fi
  args:
    executable: /bin/bash
  environment:
    HOOKS_FILE: '{{ ansible_facts["user_dir"] }}/.codex/hooks.json'
  register: codex_current_spec_prompt_hook_cleanup_result
  changed_when: codex_current_spec_prompt_hook_cleanup_result.stdout.strip() == 'changed'

- name: Merge managed Codex repo-start prompt hook into ~/.codex/hooks.json
  shell: |
    set -euo pipefail

    hooks_file="${HOOKS_FILE:?}"
    managed_command='~/.local/bin/codex-remind-repo-start-on-dev-prompt'

    if [ -f "$hooks_file" ] && jq -e --arg cmd "$managed_command" '
      .hooks.UserPromptSubmit // []
      | any(any(.hooks[]?; .type == "command" and .command == $cmd))
    ' "$hooks_file" >/dev/null 2>&1; then
      echo "unchanged"
      exit 0
    fi

    managed_entry="$(
      jq -n --arg cmd "$managed_command" '{
        hooks: [
          {
            type: "command",
            command: $cmd
          }
        ]
      }'
    )"
    tmp_file="$(mktemp)"

    if [ -f "$hooks_file" ] && [ -s "$hooks_file" ]; then
      jq --argjson entry "$managed_entry" '
        .hooks //= {} |
        .hooks.UserPromptSubmit = ((.hooks.UserPromptSubmit // []) + [$entry])
      ' "$hooks_file" > "$tmp_file"
    else
      jq -n --argjson entry "$managed_entry" '
        {hooks: {UserPromptSubmit: [$entry]}}
      ' > "$tmp_file"
    fi

    mv "$tmp_file" "$hooks_file"
    chmod 600 "$hooks_file"
    echo "changed"
  args:
    executable: /bin/bash
  environment:
    HOOKS_FILE: '{{ ansible_facts["user_dir"] }}/.codex/hooks.json'
  register: codex_repo_start_prompt_hooks_json_result
  changed_when: codex_repo_start_prompt_hooks_json_result.stdout.strip() == 'changed'

- name: Merge managed Codex agent subject prompt hook into ~/.codex/hooks.json
  shell: |
    set -euo pipefail

    hooks_file="${HOOKS_FILE:?}"
    managed_command='~/.local/bin/codex-remind-agent-subject-on-prompt'
    managed_entry="$(jq -n --arg cmd "$managed_command" '{hooks:[{type:"command",command:$cmd}]}')"
    tmp_file="$(mktemp)"

    if [ ! -s "$hooks_file" ]; then
      echo '{}' > "$hooks_file"
    fi

    jq --arg cmd "$managed_command" --argjson entry "$managed_entry" '
      .hooks //= {} |
      .hooks.UserPromptSubmit = (((.hooks.UserPromptSubmit // [])
        | map(.hooks = ((.hooks // []) | map(select(.type != "command" or .command != $cmd))))
        | map(select((.hooks // []) | length > 0))) + [$entry])
    ' "$hooks_file" > "$tmp_file"

    if jq -e --slurp '.[0] == .[1]' "$hooks_file" "$tmp_file" >/dev/null; then
      rm "$tmp_file"
      echo "unchanged"
    else
      mv "$tmp_file" "$hooks_file"
      chmod 600 "$hooks_file"
      echo "changed"
    fi
  args:
    executable: /bin/bash
  environment:
    HOOKS_FILE: '{{ ansible_facts["user_dir"] }}/.codex/hooks.json'
  register: codex_agent_subject_prompt_hooks_json_result
  changed_when: codex_agent_subject_prompt_hooks_json_result.stdout.strip() == 'changed'

- name: Trust managed Codex hooks in ~/.codex/config.toml
  command: '{{ ansible_facts["user_dir"] }}/.local/bin/codex-trust-managed-hooks'
  environment:
    CODEX_HOME: '{{ ansible_facts["user_dir"] }}/.codex'
    HOOKS_FILE: '{{ ansible_facts["user_dir"] }}/.codex/hooks.json'
    CONFIG_FILE: '{{ ansible_facts["user_dir"] }}/.codex/config.toml'
    CODEX_HOOK_QUERY_CWD: '{{ playbook_dir }}'
    PATH: '{{ ansible_facts["user_dir"] }}/.local/bin:{{ ansible_facts["user_dir"] }}/.local/share/mise/shims:{{ ansible_facts["env"]["PATH"] }}'
  register: codex_trust_managed_hooks_result
  changed_when: codex_trust_managed_hooks_result.stdout == 'changed'

- name: Enforce 0600 on ~/.codex/hooks.json
  file:
    path: '{{ ansible_facts["user_dir"] }}/.codex/hooks.json'
    mode: '0600'

