- name: Install git-delete-branch script
  copy:
    backup: yes
    dest: '{{ ansible_facts["user_dir"] }}/.local/bin/git-delete-branch'
    src: '{{ playbook_dir }}/roles/common/files/bin/git-delete-branch'
