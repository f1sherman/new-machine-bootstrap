    set -euo pipefail

    settings_file="${SETTINGS_FILE:?}"
    hook_cmd='$HOME/.local/bin/agent-current-spec-hook'
    matcher='Bash|Edit|MultiEdit|Read|Write'

    if [ ! -s "$settings_file" ]; then
      echo '{}' > "$settings_file"
    fi

    managed_entry="$(
      jq -n --arg cmd "$hook_cmd" --arg matcher "$matcher" '{
        matcher: $matcher,
        hooks: [
          {
            type: "command",
            command: $cmd
          }
        ]
      }'
    )"
    tmp_file="$(mktemp)"

    jq --arg cmd "$hook_cmd" --argjson entry "$managed_entry" '
      .hooks //= {} |
      .hooks.PostToolUse = (((.hooks.PostToolUse // [])
        | map(.hooks = ((.hooks // []) | map(select(.type != "command" or .command != $cmd))))
        | map(select((.hooks // []) | length > 0))) + [$entry])
    ' "$settings_file" > "$tmp_file"

    if jq -e --slurp '.[0] == .[1]' "$settings_file" "$tmp_file" >/dev/null; then
      rm "$tmp_file"
      echo "unchanged"
    else
      mv "$tmp_file" "$settings_file"
