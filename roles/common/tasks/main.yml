# Symlink globally-installed npm binaries into ~/.local/bin so they work
# regardless of which Node version the current directory's mise.toml selects.
- name: Create ~/.local/bin symlinks for global npm tools (Linux)
  shell: |
    node_bin="$("{{ mise_bin }}" where node@{{ tool_versions.runtimes.node }})/bin"
    for cmd in codex pi; do
      [ -x "$node_bin/$cmd" ] && ln -sf "$node_bin/$cmd" ~/.local/bin/"$cmd"
    done
  args:
    executable: /bin/bash
  changed_when: false
  when: ansible_facts["os_family"] == "Debian"

# Trust settings for shared workspaces and ~/projects/
- name: Configure Codex CLI config.toml for shared workspaces
  shell: |
    python3 -c '
    import os
    import glob

    config_file = os.environ["CONFIG_FILE"]

    existing_projects = set()
    if os.path.exists(config_file):
      with open(config_file, "r") as f:
        for line in f:
          if line.startswith("[projects."):
            start = line.find("\"")
            end = line.rfind("\"")
            if start != -1 and end != -1 and start < end:
              existing_projects.add(line[start+1:end])

    changed = False
    new_sections = []

    for workspace_dir in glob.glob("/workspaces/*"):
      if os.path.isdir(workspace_dir) and workspace_dir not in existing_projects:
        new_sections.append(f"\n[projects.\"{workspace_dir}\"]\n")
        new_sections.append("trust_level = \"trusted\"\n")
        changed = True

    if changed:
      with open(config_file, "a") as f:
        f.writelines(new_sections)
      os.chmod(config_file, 0o600)
      print("changed")
    else:
      print("unchanged")
    '
  environment:
    CONFIG_FILE: '{{ ansible_facts["user_dir"] }}/.codex/config.toml'
  register: codex_config_workspace_result
  changed_when: codex_config_workspace_result.stdout.strip() == 'changed'
  when: ansible_facts["os_family"] == "Debian"

- name: Configure Codex CLI config.toml for ~/projects/
  shell: |
    python3 -c '
    import os
    import glob

    config_file = os.environ["CONFIG_FILE"]
    projects_dir = os.path.expanduser("~/projects")

    existing_projects = set()
    if os.path.exists(config_file):
      with open(config_file, "r") as f:
        for line in f:
          if line.startswith("[projects."):
            start = line.find("\"")
            end = line.rfind("\"")
            if start != -1 and end != -1 and start < end:
              existing_projects.add(line[start+1:end])

    changed = False
    new_sections = []

    if os.path.isdir(projects_dir):
      for project_dir in glob.glob(os.path.join(projects_dir, "*")):
        if os.path.isdir(project_dir) and project_dir not in existing_projects:
          new_sections.append(f"\n[projects.\"{project_dir}\"]\n")
          new_sections.append("trust_level = \"trusted\"\n")
          changed = True

    if changed:
      with open(config_file, "a") as f:
        f.writelines(new_sections)
      os.chmod(config_file, 0o600)
      print("changed")
    else:
      print("unchanged")
    '
  environment:
    CONFIG_FILE: '{{ ansible_facts["user_dir"] }}/.codex/config.toml'
  register: codex_config_projects_result
  changed_when: codex_config_projects_result.stdout.strip() == 'changed'

- name: Enable Codex hooks in ~/.codex/config.toml
  shell: |
    set -euo pipefail

    python3 -c 'import os, textwrap; exec(textwrap.dedent("""
    import re
    from pathlib import Path

    config_file = Path(os.environ["CONFIG_FILE"])
    text = config_file.read_text() if config_file.exists() else ""
    lines = text.splitlines()

    section_header = re.compile(r"^\[(?P<name>[^\]]+)\](?:\s*[#;].*)?$")

    def section_name(line):
        match = section_header.match(line.strip())
        return match.group("name") if match else None

    output = []
    i = 0
    found_features = False

    while i < len(lines):
        line = lines[i]

        if section_name(line) == "features":
            found_features = True
            output.append(line)
            i += 1

            section_lines = []
            while i < len(lines) and section_name(lines[i]) is None:
                section_lines.append(lines[i])
                i += 1

            section_output = []
            codex_hooks_seen = False
            for section_line in section_lines:
                stripped = section_line.strip()
                if stripped.startswith("codex_hooks") and not stripped.startswith("#"):
                    if not codex_hooks_seen:
                        section_output.append("codex_hooks = true")
                        codex_hooks_seen = True
                    continue
                section_output.append(section_line)

            if not codex_hooks_seen:
                insertion_index = 0
                while (
                    insertion_index < len(section_output)
                    and (
                        section_output[insertion_index].strip() == ""
                        or section_output[insertion_index].lstrip().startswith("#")
                    )
                ):
                    insertion_index += 1
                section_output.insert(insertion_index, "codex_hooks = true")

            output.extend(section_output)
            continue

        output.append(line)
        i += 1

    if not found_features:
        if output and output[-1] != "":
            output.append("")
        output.append("[features]")
        output.append("codex_hooks = true")

    newline = chr(10)
    new_text = newline.join(output) + newline

    if new_text != text:
        config_file.write_text(new_text)
        os.chmod(config_file, 0o600)
        print("changed")
    else:
        print("unchanged")
    """))'
  args:
    executable: /bin/bash
  environment:
    CONFIG_FILE: '{{ ansible_facts["user_dir"] }}/.codex/config.toml'
  register: codex_hooks_feature_result
  changed_when: codex_hooks_feature_result.stdout.strip() == 'changed'

