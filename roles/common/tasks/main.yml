- name: Install _recover-agent-sessions helper
  copy:
    backup: yes
    dest: '{{ ansible_facts["user_dir"] }}/.local/bin/_recover-agent-sessions'
    src: '{{ playbook_dir }}/roles/common/files/bin/_recover-agent-sessions'
