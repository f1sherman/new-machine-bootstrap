- name: Remove old claude-waiting hook registrations
  shell: |
    SETTINGS='{{ ansible_facts["user_dir"] }}/.claude/settings.json'
    [ ! -f "$SETTINGS" ] && exit 0
    changed=false
    for old_cmd in '~/.claude/hooks/claude-waiting-on.sh' '~/.claude/hooks/claude-waiting-off.sh'; do
      for event in Stop PermissionRequest PreToolUse UserPromptSubmit Notification; do
        if jq --arg cmd "$old_cmd" --arg ev "$event" -e '[(.hooks[$ev] // [])[] | select(.hooks[]?.command == $cmd)] | length > 0' "$SETTINGS" > /dev/null 2>&1; then
          jq --arg cmd "$old_cmd" --arg ev "$event" '.hooks[$ev] = [(.hooks[$ev] // [])[] | select(.hooks | all(.command != $cmd))] | if (.hooks[$ev] | length) == 0 then del(.hooks[$ev]) else . end' "$SETTINGS" > "${SETTINGS}.tmp" \
            && mv "${SETTINGS}.tmp" "$SETTINGS"
          changed=true
        fi
      done
    done
    if [ "$changed" = "false" ]; then echo "already clean"; fi
  args:
    executable: /bin/bash
  register: old_hook_cleanup
  changed_when: "'already clean' not in old_hook_cleanup.stdout"

- name: Register PreToolUse and UserPromptSubmit hooks to show working indicator
  shell: |
    SETTINGS='{{ ansible_facts["user_dir"] }}/.claude/settings.json'
    HOOK_CMD='~/.claude/hooks/claude-working-on.sh'
    if [ ! -f "$SETTINGS" ]; then
      echo '{}' > "$SETTINGS"
    fi
    HOOK_ENTRY='{"hooks":[{"type":"command","command":"'"$HOOK_CMD"'"}]}'
    changed=false
    for event in PreToolUse UserPromptSubmit; do
      if jq --arg cmd "$HOOK_CMD" --arg ev "$event" -e '[(.hooks[$ev] // [])[] | select(.hooks[]?.command == $cmd)] | length > 0' "$SETTINGS" > /dev/null 2>&1; then
        continue
      fi
      jq --argjson entry "$HOOK_ENTRY" --arg ev "$event" '.hooks //= {} | .hooks[$ev] = ((.hooks[$ev] // []) + [$entry])' "$SETTINGS" > "${SETTINGS}.tmp" \
        && mv "${SETTINGS}.tmp" "$SETTINGS"
      changed=true
    done
    if [ "$changed" = "false" ]; then echo "already registered"; fi
  args:
    executable: /bin/bash
  register: working_on_hook_result
  changed_when: "'already registered' not in working_on_hook_result.stdout"

