- name: Install cc-git-branch-dirty script
  copy:
    backup: yes
    dest: '{{ ansible_facts["user_dir"] }}/.local/bin/cc-git-branch-dirty'
    src: '{{ playbook_dir }}/roles/common/files/bin/cc-git-branch-dirty'
    mode: 0755

- name: Create ~/.claude directory
  file:
    path: '{{ ansible_facts["user_dir"] }}/.claude'
    state: directory
    mode: '0700'

- name: Create ~/.claude/CLAUDE.md file
  copy:
    content: |
      User name: Brian. Work style: telegraph; noun-phrases ok; drop grammar; min tokens.

      * Workspace: `~/projects/`
      * Bias toward action. Only ask user when you can't do it yourself.
      * Spec approval and plan execution: the written spec is the only approval gate; once approved, proceed without another implementation approval prompt and always choose subagent execution automatically.
      * Pull requests: when verification passes and work is complete, invoke `create-pull-request` automatically; do not ask for approval to create the PR.
      * Worktrees: create using `worktree-start`. Created other way: run `tmux-agent-worktree set <absolute-path>`. When done: `tmux-agent-worktree clear`.
      * Comments: use sparingly. Explain why, not what.
      * Scripts/snippets: write scripts in ruby; snippets in bash unless otherwise instructed.
      * JSON/YAML parsing: use `jq` or `yq`, never use python or ruby.
      * Multi-line commands: write script to `/tmp`. Do not ask user to copy/paste over multiple lines.
      * Testing: use Red/Green TDD.
      * Superpowers specs/plans commit step: check `git check-ignore -q docs/superpowers`. If ignored, skip commit — keep local. Never `git add -f` / `--force` on `docs/superpowers/`.
      * Temp files: prefer `./tmp` if exists, else `/tmp`
      * Verification: end to end verify; confirm empirically.

    dest: '{{ ansible_facts["user_dir"] }}/.claude/CLAUDE.md'
    mode: '0600'
    backup: yes

- name: Create ~/.codex directory
  file:
    path: '{{ ansible_facts["user_dir"] }}/.codex'
    state: directory
    mode: '0700'

- name: Create ~/.codex/AGENTS.md symlink to ~/.claude/CLAUDE.md
  file:
    src: '{{ ansible_facts["user_dir"] }}/.claude/CLAUDE.md'
    dest: '{{ ansible_facts["user_dir"] }}/.codex/AGENTS.md'
    state: link

- name: Install superpowers via Codex native skill discovery
  tags:
    - superpowers
  block:
    - name: Create ~/.agents directory
      file:
        path: '{{ ansible_facts["user_dir"] }}/.agents'
        state: directory
        mode: '0755'

    - name: Create ~/.agents/skills directory
      file:
        path: '{{ ansible_facts["user_dir"] }}/.agents/skills'
        state: directory
        mode: '0755'

    - name: Clone superpowers repository for Codex native skill discovery
      git:
        dest: '{{ ansible_facts["user_dir"] }}/.codex/superpowers'
        repo: 'https://github.com/obra/superpowers.git'
        version: "{{ tool_versions.git_tags.superpowers }}"
        update: yes
        force: no

    - name: Link superpowers skills into ~/.agents/skills
      file:
        src: '{{ ansible_facts["user_dir"] }}/.codex/superpowers/skills'
        dest: '{{ ansible_facts["user_dir"] }}/.agents/skills/superpowers'
        state: link
        force: yes

- name: Create ccstatusline config directory
  file:
    path: '{{ ansible_facts["user_dir"] }}/.config/ccstatusline'
    state: directory
    mode: '0700'

- name: Install ccstatusline widget configuration
  copy:
    src: '{{ playbook_dir }}/roles/common/files/config/ccstatusline/settings.json'
    dest: '{{ ansible_facts["user_dir"] }}/.config/ccstatusline/settings.json'
    mode: '0600'

- name: Resolve mise binary
  include_tasks: '{{ playbook_dir }}/roles/common/tasks/resolve_mise_binary.yml'
  when: mise_bin is not defined

- name: Get current mise trusted_config_paths
  command: "{{ mise_bin }} settings get trusted_config_paths"
  register: mise_trusted_paths
  changed_when: false

- name: Auto-trust mise configs under ~/projects
  command: "{{ mise_bin }} settings add trusted_config_paths {{ ansible_facts['user_dir'] }}/projects"
  when: ('"' + ansible_facts['user_dir'] + '/projects"') not in mise_trusted_paths.stdout

- name: Trust mise config (Linux)
  command: "{{ mise_bin }} trust {{ playbook_dir }}/mise.toml"
  changed_when: false
  when: ansible_facts["os_family"] == "Debian"

- name: Check if pinned Node.js version is installed (Linux)
  shell: "{{ mise_bin }} ls node | awk '$1 == \"node\" && $2 == \"{{ tool_versions.runtimes.node }}\" { found = 1 } END { exit(found ? 0 : 1) }'"
  register: linux_node_installed
  changed_when: false
  failed_when: false
  when: ansible_facts["os_family"] == "Debian"

- name: Install pinned Node.js version if not installed (Linux)
  command: "{{ mise_bin }} install node@{{ tool_versions.runtimes.node }}"
  when:
    - ansible_facts["os_family"] == "Debian"
    - linux_node_installed.rc != 0

- name: Set global Node.js version via mise (Linux)
  command: "{{ mise_bin }} use --global node@{{ tool_versions.runtimes.node }}"
  changed_when: false
  when: ansible_facts["os_family"] == "Debian"

- name: Check if pinned Ruby version is installed
  shell: "{{ mise_bin }} ls ruby | awk '$1 == \"ruby\" && $2 == \"{{ tool_versions.runtimes.ruby }}\" { found = 1 } END { exit(found ? 0 : 1) }'"
  register: ruby_installed
  changed_when: false
  failed_when: false

- name: Install pinned Ruby version if not installed
  command: "{{ mise_bin }} install ruby@{{ tool_versions.runtimes.ruby }}"
  when: ruby_installed.rc != 0

- name: Get current global Ruby version from mise config
  shell: grep '^ruby = ' ~/.config/mise/config.toml 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo ""
  register: current_global_ruby
  changed_when: false

- name: Set global Ruby version via mise
  command: "{{ mise_bin }} use --global ruby@{{ tool_versions.runtimes.ruby }}"
  when: current_global_ruby.stdout != tool_versions.runtimes.ruby

- name: Configure Claude Code vim mode in ~/.claude.json
  shell: |
    python3 -c '
    import json
    import os

    config_file = os.path.expanduser("~/.claude.json")

    # Read existing config or create new one
    data = {}
    if os.path.exists(config_file):
      with open(config_file, "r") as f:
        content = f.read().strip()
      if content:
        data = json.loads(content)

    changed = False

    if data.get("editorMode") != "vim":
      data["editorMode"] = "vim"
      changed = True

    if changed:
      with open(config_file, "w") as f:
        json.dump(data, f, indent=2)
      os.chmod(config_file, 0o600)
      print("changed")
    else:
      print("unchanged")
    '
  register: claude_vim_mode_result
  changed_when: claude_vim_mode_result.stdout.strip() == 'changed'

- name: Install or update Claude Code CLI to latest version
  shell: curl -fsSL https://claude.ai/install.sh | bash -s -- latest
  changed_when: false
  register: claude_install
  failed_when:
    - claude_install.rc != 0
    - "'Text file busy' not in claude_install.stderr"

- name: Check if Claude settings.json exists
  stat:
    path: '{{ ansible_facts["user_dir"] }}/.claude/settings.json'
  register: claude_settings_stat

- name: Read existing Claude settings.json if it exists
  slurp:
    src: '{{ ansible_facts["user_dir"] }}/.claude/settings.json'
  register: claude_settings_content
  when: claude_settings_stat.stat.exists

- name: Parse existing Claude settings or use empty object
  set_fact:
    claude_settings: "{{ (claude_settings_content.content | b64decode | from_json) if claude_settings_stat.stat.exists else {} }}"

- name: Include Claude permission variables
  include_vars:
    file: claude_permissions.yml

- name: Convert legacy permission syntax (colon-star to space-star)
  set_fact:
    existing_permissions_converted:
      allow: "{{ (claude_settings.permissions.allow | default([])) | map('regex_replace', ':\\*\\)$', ' *)') | list }}"
      deny: "{{ (claude_settings.permissions.deny | default([])) | map('regex_replace', ':\\*\\)$', ' *)') | list }}"

- name: Merge permissions (allow is additive, deny is authoritative from vars file)
  set_fact:
    merged_permissions:
      allow: "{{ existing_permissions_converted.allow | difference(claude_permissions_allow_remove | default([])) | union(claude_permissions.allow) | unique | sort }}"
      deny: "{{ claude_permissions.deny | unique | sort }}"

- name: Set ccstatusline version
  set_fact:
    ccstatusline_version: "2.0.21"

- name: Merge model, statusLine, and permissions into Claude settings
  set_fact:
    merged_settings: "{{ claude_settings | combine({'model': 'opus[1m]', 'effortLevel': 'max', 'statusLine': {'type': 'command', 'command': 'npx -y ccstatusline@' ~ ccstatusline_version, 'padding': 0}, 'permissions': merged_permissions | combine({'defaultMode': 'acceptEdits'})}, recursive=True) }}"

- name: Write merged Claude settings.json
  copy:
    content: "{{ merged_settings | to_nice_json }}"
    dest: '{{ ansible_facts["user_dir"] }}/.claude/settings.json'
    mode: '0600'
    backup: yes

- name: Install Claude Code plugins
  command: claude plugin install {{ item }} --scope user
  loop:
    - pr-review-toolkit@claude-plugins-official
    - superpowers@claude-plugins-official
  register: claude_plugin_result
  changed_when: "'already installed' not in (claude_plugin_result.stdout | default(''))"
  failed_when: false

- name: Create ~/.claude/hooks directory
  file:
    path: '{{ ansible_facts["user_dir"] }}/.claude/hooks'
    state: directory
    mode: '0755'

- name: Install Claude hooks
  copy:
    src: '{{ playbook_dir }}/roles/common/files/claude/hooks/'
    dest: '{{ ansible_facts["user_dir"] }}/.claude/hooks/'
    mode: '0755'
    directory_mode: '0755'

- name: Register PreToolUse Bash hook for blocking git commit
  shell: |
    SETTINGS='{{ ansible_facts["user_dir"] }}/.claude/settings.json'
    HOOK_CMD='~/.claude/hooks/block-git-commit.sh'
    if [ ! -f "$SETTINGS" ]; then
      echo '{}' > "$SETTINGS"
    fi
    # Skip if this hook is already registered
    if jq -e '.hooks.PreToolUse // [] | map(select(.hooks[]?.command == "'"$HOOK_CMD"'")) | length > 0' "$SETTINGS" > /dev/null 2>&1; then
      echo "already registered"
      exit 0
    fi
    HOOK_ENTRY='{"matcher":"Bash","hooks":[{"type":"command","command":"'"$HOOK_CMD"'"}]}'
    jq --argjson entry "$HOOK_ENTRY" '.hooks //= {} | .hooks.PreToolUse = ((.hooks.PreToolUse // []) + [$entry])' "$SETTINGS" > "${SETTINGS}.tmp" \
      && mv "${SETTINGS}.tmp" "$SETTINGS"
  args:
    executable: /bin/bash
  register: hook_register_result
  changed_when: "'already registered' not in hook_register_result.stdout"

- name: Register PreToolUse Bash hook for blocking raw git worktree commands
  shell: |
    SETTINGS='{{ ansible_facts["user_dir"] }}/.claude/settings.json'
    HOOK_CMD='~/.claude/hooks/block-worktree-commands.sh'
    if [ ! -f "$SETTINGS" ]; then
      echo '{}' > "$SETTINGS"
    fi
    # Skip if this hook is already registered
    if jq -e '.hooks.PreToolUse // [] | map(select(.hooks[]?.command == "'"$HOOK_CMD"'")) | length > 0' "$SETTINGS" > /dev/null 2>&1; then
      echo "already registered"
      exit 0
    fi
    HOOK_ENTRY='{"matcher":"Bash","hooks":[{"type":"command","command":"'"$HOOK_CMD"'"}]}'
    jq --argjson entry "$HOOK_ENTRY" '.hooks //= {} | .hooks.PreToolUse = ((.hooks.PreToolUse // []) + [$entry])' "$SETTINGS" > "${SETTINGS}.tmp" \
      && mv "${SETTINGS}.tmp" "$SETTINGS"
  args:
    executable: /bin/bash
  register: block_worktree_hook_result
  changed_when: "'already registered' not in block_worktree_hook_result.stdout"

- name: Register PreToolUse Edit|MultiEdit|Write hook for blocking main-branch file edits
  shell: |
    set -euo pipefail

    settings_file="${SETTINGS_FILE:?}"
    hook_cmd='~/.claude/hooks/block-main-branch-edits.sh'

    if [ ! -f "$settings_file" ]; then
      echo '{}' > "$settings_file"
    fi

    if jq -e --arg cmd "$hook_cmd" '
      .hooks.PreToolUse // []
      | any(.matcher == "Edit|MultiEdit|Write" and any(.hooks[]?; .type == "command" and .command == $cmd))
    ' "$settings_file" >/dev/null 2>&1; then
      echo "unchanged"
      exit 0
    fi

    managed_entry="$(
      jq -n --arg cmd "$hook_cmd" '{
        matcher: "Edit|MultiEdit|Write",
        hooks: [
          {
            type: "command",
            command: $cmd
          }
        ]
      }'
    )"
    tmp_file="$(mktemp)"

    if [ -f "$settings_file" ] && [ -s "$settings_file" ]; then
      jq --argjson entry "$managed_entry" '
        .hooks //= {} |
        .hooks.PreToolUse = ((.hooks.PreToolUse // []) + [$entry])
      ' "$settings_file" > "$tmp_file"
    else
      jq -n --argjson entry "$managed_entry" '
        {hooks: {PreToolUse: [$entry]}}
      ' > "$tmp_file"
    fi

    mv "$tmp_file" "$settings_file"
    echo "changed"
  args:
    executable: /bin/bash
  environment:
    SETTINGS_FILE: '{{ ansible_facts["user_dir"] }}/.claude/settings.json'
  register: claude_main_edit_hook_result
  changed_when: claude_main_edit_hook_result.stdout.strip() == 'changed'

