---
# Linux Package Installation - runs during pre_tasks
#
# Installs all packages required by common role:
# - git: required for repository cloning
# - fzf, nvim, rg: installed from GitHub Releases
# - tmux, bat: used by scripts and dotfiles
# - zsh: required for shell configuration
#
# This file is imported during pre_tasks to ensure dependencies
# are available before the common role runs.

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: Install Linux packages
  apt:
    name:
      - bat
      - curl
      - fd-find
      - gh
      - git
      - jq
      - python3
      - python3-pip
      - python3-venv
      - pipx
      - shellcheck
      - sudo
      - unzip
      - yamllint
      - zsh
    state: present
  become: yes

- name: Create ~/.local/bin directory
  file:
    path: '{{ ansible_facts["user_dir"] }}/.local/bin'
    state: directory
    mode: 0755

- name: Remove fzf apt package if installed
  apt:
    name: fzf
    state: absent
  become: yes

- name: Install fzf
  include_tasks: '{{ playbook_dir }}/roles/common/tasks/install_github_binary.yml'
  vars:
    github_repo: junegunn/fzf
    binary_name: fzf
    asset_pattern: "fzf-{version}-linux_{arch}.tar.gz"
    install_dest: '{{ ansible_facts["user_dir"] }}/.local/bin'
    download_type: tarball

- name: Clone fzf repo for shell integration files
  git:
    repo: 'https://github.com/junegunn/fzf.git'
    dest: '{{ ansible_facts["user_dir"] }}/.fzf'
    depth: 1
    version: master
    update: yes

- name: Create ~/.fzf/bin directory for vim plugin compatibility
  file:
    path: '{{ ansible_facts["user_dir"] }}/.fzf/bin'
    state: directory
    mode: 0755

- name: Create fzf symlink for vim plugin
  file:
    src: '{{ ansible_facts["user_dir"] }}/.local/bin/fzf'
    dest: '{{ ansible_facts["user_dir"] }}/.fzf/bin/fzf'
    state: link
    force: yes

- name: Create fzf config directory
  file:
    path: '{{ ansible_facts["user_dir"] }}/.config/fzf'
    state: directory
    mode: 0755

- name: Remove ripgrep apt package if installed
  apt:
    name: ripgrep
    state: absent
  become: yes

- name: Install rg
  include_tasks: '{{ playbook_dir }}/roles/common/tasks/install_github_binary.yml'
  vars:
    github_repo: BurntSushi/ripgrep
    binary_name: rg
    asset_pattern: "ripgrep_{version}-1_{arch}.deb"
    install_dest: /usr/bin/rg
    download_type: deb
    arch_map:
      x86_64: amd64
      aarch64: arm64

- name: Install delta
  include_tasks: '{{ playbook_dir }}/roles/common/tasks/install_github_binary.yml'
  vars:
    github_repo: dandavison/delta
    binary_name: delta
    asset_pattern: "delta-{version}-{arch}-unknown-linux-gnu.tar.gz"
    install_dest: '{{ ansible_facts["user_dir"] }}/.local/bin'
    download_type: tarball
    tarball_extra_args:
      - --strip-components=1
      - --wildcards
      - '*/delta'
    arch_map:
      x86_64: x86_64
      aarch64: aarch64
      arm64: aarch64

- name: Install tmux
  include_tasks: '{{ playbook_dir }}/roles/common/tasks/install_github_binary.yml'
  vars:
    github_repo: tmux/tmux-builds
    binary_name: tmux
    asset_pattern: "tmux-{version}-linux-{arch}.tar.gz"
    install_dest: '{{ ansible_facts["user_dir"] }}/.local/bin'
    download_type: tarball
    arch_map:
      x86_64: x86_64
      aarch64: arm64

- name: Create tmux symlink in /usr/local/bin
  file:
    src: '{{ ansible_facts["user_dir"] }}/.local/bin/tmux'
    dest: /usr/local/bin/tmux
    state: link
  become: yes

- name: Remove apt neovim if installed
  apt:
    name: neovim
    state: absent
  become: yes

# nvim v0.11+ requires glibc 2.32+; pin to v0.10.4 on older systems (e.g. Ubuntu 20.04)
- name: Check glibc version for nvim compatibility
  shell: ldd --version 2>&1 | head -1 | grep -oP '[\d.]+$'
  register: _glibc_version
  changed_when: false

- name: Pin nvim to v0.10.4 for old glibc
  set_fact:
    pinned_release_tag: v0.10.4
  when: _glibc_version.stdout is version('2.32', '<')

- name: Install nvim
  include_tasks: '{{ playbook_dir }}/roles/common/tasks/install_github_binary.yml'
  vars:
    github_repo: neovim/neovim
    binary_name: nvim
    asset_pattern: "nvim-linux-{arch}.tar.gz"
    install_dest: '{{ ansible_facts["user_dir"] }}/.local'
    download_type: tarball
    tarball_extra_args:
      - --strip-components=1
    arch_map:
      x86_64: x86_64
      aarch64: arm64
      arm64: arm64

- name: Clear pinned release tag
  set_fact:
    pinned_release_tag: ''

- name: Install yq
  include_tasks: '{{ playbook_dir }}/roles/common/tasks/install_github_binary.yml'
  vars:
    github_repo: mikefarah/yq
    binary_name: yq
    asset_pattern: "yq_linux_{arch}"
    install_dest: '{{ ansible_facts["user_dir"] }}/.local/bin/yq'

- name: Install zoxide
  include_tasks: '{{ playbook_dir }}/roles/common/tasks/install_github_binary.yml'
  vars:
    github_repo: ajeetdsouza/zoxide
    binary_name: zoxide
    asset_pattern: "zoxide-{version}-{arch}-unknown-linux-musl.tar.gz"
    install_dest: '{{ ansible_facts["user_dir"] }}/.local/bin'
    download_type: tarball
    tarball_extra_args:
      - --wildcards
      - 'zoxide'
    arch_map:
      x86_64: x86_64
      aarch64: aarch64
      arm64: aarch64

- name: Check if mise is installed
  shell: command -v mise
  register: mise_check
  changed_when: false
  failed_when: false

- name: Install mise
  shell: curl -fsSL https://mise.run | sh
  args:
    executable: /bin/bash
  when: mise_check.rc != 0

- name: Create fd symlink (fdfind -> fd)
  file:
    src: /usr/bin/fdfind
    dest: '{{ ansible_facts["user_dir"] }}/.local/bin/fd'
    state: link

- name: Create bat symlink (batcat -> bat)
  file:
    src: /usr/bin/batcat
    dest: '{{ ansible_facts["user_dir"] }}/.local/bin/bat'
    state: link

- name: Create vim symlink (nvim -> vim)
  file:
    src: '{{ ansible_facts["user_dir"] }}/.local/bin/nvim'
    dest: '{{ ansible_facts["user_dir"] }}/.local/bin/vim'
    state: link
    force: yes
