---
# Bootstrap Playbook - Execution Order:
# 1. pre_tasks: Install platform-specific packages and tools
#    - Ensures tools (git, nvim, fzf, etc.) available before common role
# 2. roles: Configuration using installed tools
#    - common: Shared configuration (dotfiles, plugins, scripts)
#    - linux: Shared Linux/Debian configuration (tmux, shell, FZF)
#    - macos: macOS-specific configuration
#    - dev_host: Linux dev host-specific configuration
#
# This architecture ensures dependencies are explicit and tools are available
# before tasks that need them, avoiding timing issues.

- hosts: localhost
  connection: local
  vars_files:
    - vars/tool_versions.yml
  pre_tasks:
    - name: Verify Low Power Mode is enabled on battery only (macOS)
      shell: |
        if ! pmset -g cap 2>/dev/null | grep -qw lowpowermode; then
          echo skip
          exit 0
        fi
        pmset -g custom | awk '
          /^Battery Power:/ { mode = "battery" }
          /^AC Power:/      { mode = "ac" }
          /^[[:space:]]*(low)?powermode[[:space:]]/ {
            if (mode == "battery") battery = $2
            else if (mode == "ac") ac = $2
          }
          END {
            if (battery == "1" && ac != "1") print "ok"
            else printf "battery=%s ac=%s\n", battery, ac
          }
        '
      register: lpm_check
      changed_when: false
      check_mode: no
      when: ansible_facts["os_family"] == "Darwin"

    - name: Require Low Power Mode on battery only (macOS)
      fail:
        msg: |
          Low Power Mode is misconfigured ({{ lpm_check.stdout }}).
          Required: enabled on battery, disabled on AC.
          Run `bin/setup` to fix, or manually:
            sudo pmset -b powermode 1
            sudo pmset -c powermode 0
      when:
        - ansible_facts["os_family"] == "Darwin"
        - lpm_check.stdout is defined
        - lpm_check.stdout not in ["skip", "ok"]

    - name: Verify launchctl maxfiles soft limit (macOS)
      shell: |
        soft="$(launchctl limit maxfiles 2>/dev/null | awk '/maxfiles/ {print $2}')"
        if [ -z "$soft" ]; then
          echo skip
          exit 0
        fi
        if [ "$soft" -ge 65536 ]; then
          echo ok
        else
          echo "$soft"
        fi
      register: maxfiles_check
      changed_when: false
      check_mode: no
      when: ansible_facts["os_family"] == "Darwin"

    - name: Require launchctl maxfiles soft limit >= 65536 (macOS)
      fail:
        msg: |
          launchctl maxfiles soft limit is {{ maxfiles_check.stdout }} (need >= 65536).
          The default 256 causes tmux servers with many panes to fd-lock and
          can no longer fork new sessions or windows. Run `bin/setup` to install
          /Library/LaunchDaemons/limit.maxfiles.plist, then log out and back in
          (or reboot) so launchd-started processes inherit the new limit.
      when:
        - ansible_facts["os_family"] == "Darwin"
        - maxfiles_check.stdout is defined
        - maxfiles_check.stdout not in ["skip", "ok"]

    # Platform packages must be installed first - common role depends on them
    - name: Install platform packages (macOS)
      import_tasks: roles/macos/tasks/install_packages.yml
      when: ansible_facts["os_family"] == "Darwin"

    - name: Install platform packages (Linux)
      import_tasks: roles/linux/tasks/install_packages.yml
      when: ansible_facts["os_family"] == "Debian"

  roles:
    # Common role assumes tools are installed by pre_tasks
    - common

    # Shared Linux configuration (runs on all Debian hosts)
    - role: linux
      when: ansible_facts["os_family"] == "Debian"

    # Platform roles handle platform-specific configuration
    - role: macos
      when: ansible_facts["os_family"] == "Darwin"
    - role: dev_host
      when: ansible_facts["os_family"] == "Debian" and lookup('env', 'CODESPACES') != 'true'
